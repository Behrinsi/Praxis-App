function runRezeptCheck(){
  const F=[]; const add=(lv,t)=>F.push({lv,t});
  const V=[]; const sug=t=>V.push(t);
  const gKey=val('ck-gruppe');
  if(!gKey){ el('check-result').innerHTML=`<div class="note-box">Bitte zuerst die Diagnosegruppe wählen.</div>`; return; }
  const G=HMK[gKey];
  const blanko=el('ck-blanko').checked, dringlich=el('ck-dringlich').checked, lhb=el('ck-lhb').checked;
  const ausst=val('ck-ausstellung'), beginn=val('ck-beginn'), geb=val('ck-geb');
  const freq=parseInt(val('ck-freq'),10)||0;
  const hm=[];
  for(let i=0;i<4;i++){ const h=val('ck-hm-'+i); const e=parseInt(val('ck-ein-'+i),10)||0; if(h) hm.push({h,e}); }

  /* ICD-10: Format und Plausibilität zur Diagnosegruppe */
  const icdRaw=val('ck-icd');
  const icd=icdNorm(icdRaw);
  const icdClean=icd.replace(/-$/,'').replace(/\.$/,'');
  const icdValid=/^[A-Z]\d{2}(\.\d{1,2})?$/.test(icdClean);
  if(!icdRaw){
    add('I','Kein ICD-10-Code eingetragen. Auf der Verordnung ist er Pflichtangabe – ohne Code keine Diagnose-Plausibilisierung.');
  } else if(!icdValid){
    add('W',`„${icdRaw}“ sieht nicht nach einem gültigen ICD-10-GM-Code aus (erwartet z. B. M75.1 oder G82.-). Bitte Schreibweise prüfen.`);
    const rep=icdRepair(icdRaw);
    if(rep) sug(`Vermutlich Schreibweise: Gemeint ist wahrscheinlich ${rep} – bitte auf der Verordnung prüfen.`);
  } else {
    const hit=HMK_ICD_ORIENT.find(o=>o.re.test(icdClean));
    if(hit && hit.g){
      if(hit.g.indexOf(gKey)>=0) add('OK',`ICD ${icdClean} (${hit.t}) passt plausibel zur Diagnosegruppe ${gKey}.`);
      else {
        add('W',`ICD ${icdClean} gehört zu ${hit.t} – typische Diagnosegruppe(n): ${hit.g.join(', ')}. Angegeben ist ${gKey}. Für Regel-Verordnungen gibt es keine abschließende amtliche Zuordnungsliste (die Zuordnung trifft die Arztpraxis) – bei offensichtlicher Diskrepanz Rücksprache empfohlen.`);
        sug(`Diagnosegruppe prüfen: Für ICD ${icdClean} ist typischerweise die Gruppe ${hit.g[0]} vorgesehen – ggf. Neuausstellung mit Diagnosegruppe ${hit.g[0]} statt ${gKey}.`);
        if(HMK_GRUPPEN_BEISPIELE[gKey]) sug(`Falls inhaltlich die Gruppe ${gKey} (${HMK[gKey].name}) zutrifft, wären typische ICD-Beispiele: ${HMK_GRUPPEN_BEISPIELE[gKey].join(' · ')}.`);
      }
    } else if(hit){
      add('I',`ICD ${icdClean} (${hit.t}): Die Gruppenzuordnung ist hier diagnosespezifisch – keine automatische Orientierung möglich.`);
    } else {
      add('I',`ICD ${icdClean}: keine automatische Gruppen-Orientierung hinterlegt – Zuordnung laut Verordnung übernehmen.`);
    }
  }

  /* Alter (falls Geburtsdatum angegeben) */
  let alter=null;
  if(geb && ausst){ const g=new Date(geb), a=new Date(ausst); alter=a.getFullYear()-g.getFullYear(); const m=a.getMonth()-g.getMonth(); if(m<0||(m===0&&a.getDate()<g.getDate())) alter--; }

  /* 1) Fristen */
  if(ausst && beginn){
    const tage=daysBetween(ausst, beginn);
    if(tage<0) add('F','Der Behandlungsbeginn liegt vor dem Ausstellungsdatum.');
    else if(blanko){
      if(tage>112) add('F',`Blankoverordnung: Gültigkeit von 16 Wochen ab Ausstellungsdatum überschritten (${tage} Tage).`);
      else add('OK',`Behandlungsbeginn innerhalb der 16-wöchigen Gültigkeit der Blankoverordnung (${tage} Tage nach Ausstellung).`);
    } else {
      const frist=dringlich?14:28;
      if(tage>frist) add('F',`Behandlungsbeginn ${tage} Tage nach Ausstellung – zulässig sind höchstens ${frist} Tage${dringlich?' (dringlicher Behandlungsbedarf)':''}. Die Verordnung verliert sonst ihre Gültigkeit.`);
      else add('OK',`Behandlungsbeginn fristgerecht (${tage} von max. ${frist} Tagen nach Ausstellung).`);
    }
  }

  /* 2) Blanko-Plausibilität inkl. abschließender Diagnoseliste (Anhang 1) */
  if(blanko){
    if(!G.blanko) add('W',`Die Blankoverordnung Physiotherapie gilt derzeit für Schulter-Diagnosen der Gruppe EX. Für die Gruppe ${gKey} ist eine Blankoverordnung ungewöhnlich – bitte prüfen.`);
    else {
      add('I','Blankoverordnung: Auswahl der Heilmittel (aus dem Katalog der Gruppe EX), Menge und Frequenz liegen bei der Therapeutin; Mengensteuerung über das Ampelsystem der Blanko-Vereinbarung.');
      if(icdValid){
        if(icdBlankoMatch(icdClean)){
          add('OK',`ICD ${icdClean} steht auf der abschließenden Blanko-Diagnoseliste (Anhang 1, Schulter) – Blankoverordnung mit Gruppe EX zulässig.`);
          if(/^(Z96\.60|Z98\.8)/.test(icdClean)) add('I','Z96.60 bzw. Z98.8 begründen die Blankoverordnung nur in der vereinbarten Kombination (Z96.60 + Z98.8 bzw. M24.41 + Z98.8) – bitte prüfen, dass beide Codes auf der Verordnung stehen.');
          if(/^(M75\.1|T22\.3)/.test(icdClean)) add('I','Für diesen Code gilt zusätzlich BVB bzw. langfristiger Heilmittelbedarf – das Ampelsystem der Blanko-Vereinbarung greift hier nicht.');
        } else {
          add('W',`ICD ${icdClean} steht NICHT auf der abschließenden Blanko-Diagnoseliste (114 Schulter-Codes, Anhang 1 zum Vertrag nach § 125a SGB V). Ohne gelisteten Code ist keine Blankoverordnung möglich – es wäre eine Regel-Verordnung erforderlich.`);
          const alts=blankoAlternativen(icdClean);
          sug(`Blanko-fähige Codes als Rücksprache-Vorschlag (nur sofern die tatsächliche Diagnose entspricht): ${alts.map(a=>a.code+(blankoName(a.code)?' – '+blankoName(a.code):'')+' ('+a.warum+')').join(' · ')}. Alternativ: Neuausstellung als Regel-Verordnung mit dem vorhandenen Code.`);
        }
      } else {
        add('I','Für die Blanko-Prüfung bitte den ICD-10-Code eintragen – die Diagnoseliste (114 Schulter-Codes) ist abschließend.');
      }
    }
  }

  /* 3) Heilmittel-Zulässigkeit */
  if(!hm.length) add('W','Es wurde kein Heilmittel eingetragen – Zulässigkeit und Mengen können nicht geprüft werden.');
  let sumV=0, sumE=0, nV=0, nE=0, hatKombi=false;
  hm.forEach(x=>{
    const isV=G.v.includes(x.h), isE=G.e.includes(x.h);
    if(x.h==='Standardisierte Heilmittelkombination') hatKombi=true;
    if(isV){ nV++; sumV+=x.e; add('OK',`„${x.h}“ ist in Gruppe ${gKey} als vorrangiges Heilmittel verordnungsfähig.`); }
    else if(isE){ nE++; sumE+=x.e; add('OK',`„${x.h}“ ist in Gruppe ${gKey} als ergänzendes Heilmittel verordnungsfähig.`); }
    else {
      add('F',`„${x.h}“ ist in der Diagnosegruppe ${gKey} (${G.name}) NICHT verordnungsfähig – Absetzungsgefahr. Rücksprache mit der Arztpraxis (Änderung/Neuausstellung) empfohlen.`);
      const gs=Object.keys(HMK).filter(k=>HMK[k].v.indexOf(x.h)>=0);
      if(gs.length) sug(`„${x.h}“ ist vorrangig verordnungsfähig in: ${gs.join(', ')}. Falls die entsprechende Indikation vorliegt, Neuausstellung mit Gruppe ${gs[0]} erwägen${HMK_GRUPPEN_BEISPIELE[gs[0]]?` (typischer ICD z. B. ${HMK_GRUPPEN_BEISPIELE[gs[0]][0]})`:''}.`);
      else { const ge=Object.keys(HMK).filter(k=>HMK[k].e.indexOf(x.h)>=0); if(ge.length) sug(`„${x.h}“ ist (nur als ergänzendes Heilmittel) verordnungsfähig in: ${ge.join(', ')}.`); }
    }
  });

  /* 4) Kombinationsregeln */
  if(nV>3) add('F','Mehr als drei vorrangige Heilmittel auf einer Verordnung sind nicht zulässig (max. 3 vorrangige + 1 ergänzendes).');
  if(nE>1) add('F','Mehr als ein ergänzendes Heilmittel je Verordnung ist nicht zulässig.');
  if(nE>0 && nV===0) add('F','Ein ergänzendes Heilmittel kann nur zusätzlich zu einem vorrangigen Heilmittel verordnet werden.');
  if(hatKombi && hm.length>1) add('W','Die standardisierte Heilmittelkombination deckt komplexe Schädigungen ab – die gleichzeitige Verordnung weiterer Heilmittel auf demselben Rezept ist unüblich und sollte geprüft werden.');

  /* 5) Mengen */
  if(!blanko && sumV>0){
    if(sumV>G.hm){
      if(lhb) add('W',`Summe der vorrangigen Einheiten (${sumV}) überschreitet die Höchstmenge je Verordnung (${G.hm}). Bei langfristigem/besonderem Verordnungsbedarf ist eine Bemessung für bis zu 12 Wochen Behandlungsdauer zulässig – ICD-10 und Diagnosegruppe müssen der Diagnoseliste entsprechen (bzw. Genehmigung vorliegen).`);
      else add('F',`Summe der vorrangigen Einheiten (${sumV}) überschreitet die Höchstmenge je Verordnung der Gruppe ${gKey} (bis zu ${G.hm}).`);
    } else add('OK',`Vorrangige Einheiten (${sumV}) innerhalb der Höchstmenge je Verordnung (bis zu ${G.hm}).`);
    if(sumE>G.hm) add('W',`Die Einheiten des ergänzenden Heilmittels (${sumE}) überschreiten die Höchstmenge je Verordnung (${G.hm}).`);
  }
  add('I',`Orientierende Behandlungsmenge der Gruppe ${gKey}: ${G.om}. Sie gilt je Verordnungsfall (gleicher Arzt, gleiche Erkrankung; endet 6 Monate nach der letzten Verordnung); eine medizinisch begründete Überschreitung ist möglich.`);

  /* 6) Alter (ZN) */
  if(alter!=null){
    hm.forEach(x=>{
      if(x.h==='KG-ZNS-Kinder' && alter>=18) add('F',`KG-ZNS-Kinder ist längstens bis zur Vollendung des 18. Lebensjahres verordnungsfähig (Alter: ${alter}).`);
      if(x.h==='KG-ZNS' && alter<18) add('F',`KG-ZNS gilt für Patientinnen und Patienten nach Vollendung des 18. Lebensjahres (Alter: ${alter}) – für Kinder/Jugendliche: KG-ZNS-Kinder.`);
    });
  } else if(hm.some(x=>x.h==='KG-ZNS'||x.h==='KG-ZNS-Kinder')){
    add('I','KG-ZNS gilt ab, KG-ZNS-Kinder bis zur Vollendung des 18. Lebensjahres – Geburtsdatum eintragen, um dies zu prüfen.');
  }

  /* 7) Frequenz */
  if(freq && !blanko){
    if(freq<1||freq>3) add('W',`Angegebene Frequenz ${freq}×/Woche liegt außerhalb der Frequenzempfehlung (1–3× wöchentlich). Die Frequenz ist eine Empfehlung; deutliche Abweichungen sollten medizinisch begründet sein.`);
    else add('OK',`Frequenz ${freq}×/Woche innerhalb der Empfehlung (1–3× wöchentlich).`);
  }
  if(G.hinweis) add('I',G.hinweis);
  if(lhb) add('I',`Langfristiger/besonderer Verordnungsbedarf: Verordnung ist extrabudgetär; ICD-10-Code und Diagnosegruppe müssen exakt der Diagnoseliste entsprechen (bzw. Kassen-Genehmigung). ${icdValid?`Abgleich für ICD ${icdClean} + Gruppe ${gKey}: `:''}<a href="https://www.kbv.de/documents/praxis/verordnungen/heilmittel/heilmittel-diagnoseliste.pdf" target="_blank" rel="noopener" style="color:var(--accent)">KBV-Diagnoseliste LHB/BVB (PDF)</a>.`);

  /* Ergebnis rendern */
  const nF=F.filter(x=>x.lv==='F').length, nW=F.filter(x=>x.lv==='W').length;
  const banner = nF
    ? `<div class="check-banner f">✗ ${nF} kritische${nF>1?'':'r'} Punkt${nF>1?'e':''} – Verordnung in dieser Form voraussichtlich nicht abrechenbar. Vor Behandlungsbeginn klären (Arztpraxis/abrechnende Praxis).</div>`
    : nW ? `<div class="check-banner w">⚠ Keine kritischen Fehler, aber ${nW} Hinweis${nW>1?'e':''} – bitte prüfen.</div>`
         : `<div class="check-banner ok">✓ Keine Auffälligkeiten nach Katalog- und Fristenprüfung.</div>`;
  const LV={F:['Fehler','f'],W:['Hinweis','w'],OK:['OK','ok'],I:['Info','i']};
  lastCheck={ gKey, gName:G.name, icd: icdValid?icdClean:(icdRaw||'—'), blanko, patient:val('ck-patient'), ausst,
    findings:F.filter(x=>x.lv==='F'||x.lv==='W').map(x=>x.t.replace(/<[^>]*>/g,'')), vorschlaege:V.slice() };
  const vHtml = V.length ? `<div class="check-vorschlag">
      <div class="k">Vorschläge für die Rücksprache mit der Arztpraxis</div>
      ${V.map(t=>`<div class="vi">– ${t}</div>`).join('')}
      <div class="vd">Die Codierung obliegt der Arztpraxis. Die Vorschläge gelten nur, sofern die tatsächliche Diagnose ihnen entspricht – sie dienen der Rücksprache, nicht der „passenden“ Abrechnung.</div>
      <div class="btn-row" style="margin-top:10px"><button class="btn btn-ghost btn-sm" data-action="print-ruecksprache">Rücksprache-Notiz drucken</button></div>
    </div>` : '';
  el('check-result').innerHTML = banner
    + `<div class="check-list">${F.map(x=>`<div class="check-item"><span class="check-badge ${LV[x.lv][1]}">${LV[x.lv][0]}</span><div>${x.t}</div></div>`).join('')}</div>`
    + vHtml
    + `<div class="hint" style="margin-top:12px"><strong>Formalien auf dem Rezept zusätzlich prüfen:</strong> Arztunterschrift &amp; Betriebsstättenstempel · Verordnungsdatum · Versichertendaten · ICD-10-Code und Diagnosegruppe · Leitsymptomatik (Buchstabe oder Freitext) · Heilmittel mit Einheiten · ggf. Therapiebericht/Hausbesuch angekreuzt · nachträgliche Änderungen nur mit ärztlicher Abzeichnung gültig · Behandlungsunterbrechungen über 14 Kalendertage dokumentieren/begründen.</div>`
    + `<div class="hint" style="margin-top:6px;color:var(--muted)">Regelstand: ${HMK_STAND} · Blanko-Diagnoseliste: Anhang 1 zum Vertrag nach § 125a SGB V (i. d. F. 01.11.2024). Ohne Gewähr – verbindlich prüfen Abrechnungsstelle und Krankenkasse.</div>`;
}

    ${vs?`<div class="doc-intro" style="margin-top:3mm"><p style="font-weight:600;margin-bottom:2.6mm">Vorschlag zur Neuausstellung – sofern die tatsächliche Diagnose dem entspricht:</p>${vs}<p style="font-size:9pt;color:var(--muted)">Die Codierung und die Auswahl der Diagnosegruppe obliegen selbstverständlich Ihrer Praxis.</p></div>`:''}
    <div class="doc-intro" style="margin-top:3mm"><p>Ich bitte um kurze Prüfung und – falls zutreffend – um eine korrigierte Neuausstellung, damit die Behandlung zeitnah beginnen bzw. fortgesetzt werden kann. Für Rückfragen stehe ich gern zur Verfügung. Vielen Dank!</p></div>
    <div class="doc-sign"><div class="g">Mit freundlichen und kollegialen Grüßen</div><div class="s">${esc(state.praxis.name)}</div></div>

}

function kalPatientenNamen(){
  const set=new Set();
  (state.kalender||[]).forEach(t=>{ if(t.typ==='patient'&&t.patient) set.add(t.patient.trim()); });
  (state.rezepte||[]).forEach(r=>{ if(r.patient) set.add(r.patient.trim()); });
  (state.rechnungen||[]).forEach(r=>{ if(r.name) set.add(r.name.trim()); });
  return [...set].filter(Boolean).sort((a,b)=>a.localeCompare(b,'de'));
}

    <div class="field" id="t-wrap-patient" style="${e.typ==='patient'?'':'display:none'}">

function saveKalTermin(){
  const e=edKalTermin; if(!e) return;
  e.typ=val('t-typ')||'sonstig'; e.datum=val('t-datum'); e.von=val('t-von'); e.bis=val('t-bis');
  e.patient=val('t-patient'); e.titel=val('t-titel'); e.notiz=val('t-notiz');
  e.erinnerung=parseInt(val('t-erinnerung'),10)||0; e.erinnert=false;
  if(!e.datum){ alert('Bitte ein Datum wählen.'); return; }
  if(e.typ==='patient' && !(e.patient||'').trim()){ alert('Bitte den Namen der Patientin / des Patienten eingeben.'); return; }
  if(!Array.isArray(state.kalender)) state.kalender=[];
  const idx=state.kalender.findIndex(x=>x.id===e.id);
  const rep=el('t-repeat')?val('t-repeat'):'';
  const bis=el('t-repeat-bis')?val('t-repeat-bis'):'';
  if(idx>=0){ state.kalender[idx]=e; }
  else if(rep==='w' && bis && bis>e.datum){
    const serieId=uid(); let d=e.datum, n=0;
    while(d<=bis && n<60){ state.kalender.push(Object.assign(structuredClone(e),{id:uid(), datum:d, serieId})); d=addDays(d,7); n++; }
  } else { state.kalender.push(e); }
  saveData(); closeModal();
  ui.kalTag=e.datum; ui.kalMonat=e.datum.slice(0,7); ui.view='kalender'; render();
}

function delKalTermin(id){
  const t=(state.kalender||[]).find(x=>x.id===id); if(!t) return;
  const serie=t.serieId?state.kalender.filter(x=>x.serieId===t.serieId):[];
  if(serie.length>1){
    pendingKalDel=t;
    openModal('Termin löschen', `<p style="font-size:13.5px;color:var(--soft);margin:0">Dieser Termin gehört zu einer wöchentlichen Serie mit ${serie.length} Terminen („${esc(kalTitel(t))}“).</p>`,
      `<button class="btn-link" data-action="close-modal">Abbrechen</button>
       <button class="btn btn-ghost" data-action="del-termin-one">Nur diesen Termin</button>
       <button class="btn-link danger" data-action="del-termin-serie">Ganze Serie löschen</button>`);
  } else {
    if(confirm(`Termin „${kalTitel(t)}“ am ${fmtDate(t.datum)} löschen?`)){
      state.kalender=state.kalender.filter(x=>x.id!==id); saveData(); render();
    }
  }
}

/* ICS-Export für iPhone-/Geräte-Kalender (echte Erinnerungen auch bei geschlossener App) */
function addMinutesHM(hm,min){ const [h,m]=hm.split(':').map(Number); const d=new Date(2000,0,1,h,(m||0)+min); return pad2(d.getHours())+':'+pad2(d.getMinutes()); }
function kalICS(list){
  const e2=v=>String(v||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\r?\n/g,'\\n');
  const dt=(d,t)=>d.replace(/-/g,'')+'T'+(t||'09:00').replace(':','')+'00';
  const stamp=new Date().toISOString().replace(/[-:]/g,'').slice(0,15)+'Z';
  const L=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Praxis Behringer//Terminplan//DE','CALSCALE:GREGORIAN'];
  list.forEach(t=>{
    const von=t.von||'09:00';
    const bis=t.bis||addMinutesHM(von,30);
    L.push('BEGIN:VEVENT','UID:'+t.id+'@praxis-behringer','DTSTAMP:'+stamp,
      'DTSTART:'+dt(t.datum,von),'DTEND:'+dt(t.datum,bis),
      'SUMMARY:'+e2(kalTitel(t)+' · '+kalTypLabel(t.typ)));
    if(t.notiz) L.push('DESCRIPTION:'+e2(t.notiz));
    if(t.erinnerung){ L.push('BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:Erinnerung','TRIGGER:-PT'+(t.erinnerung>=60?Math.round(t.erinnerung/60)+'H':t.erinnerung+'M'),'END:VALARM'); }
    L.push('END:VEVENT');
  });
  L.push('END:VCALENDAR');
  return L.join('\r\n');
}
function exportTermineICS(){
  const heute=todayISO();
  const list=(state.kalender||[]).filter(t=>t.datum>=heute).sort((a,b)=>(a.datum+(a.von||'')).localeCompare(b.datum+(b.von||'')));
  if(!list.length){ alert('Keine künftigen Termine vorhanden.'); return; }
  const blob=new Blob([kalICS(list)],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='Termine_Praxis_Behringer.ics';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('Kalenderdatei exportiert – in der Kalender-App öffnen');
}

/* Erinnerungen (solange die App geöffnet ist) */
function kalReminderCheck(){
  const list=state.kalender||[]; if(!list.length) return;
  if(el('lock-screen')) return; /* keine Termindetails auf dem Sperrbildschirm */
  const now=new Date(); let changed=false;
  list.forEach(t=>{
    if(!t.erinnerung||t.erinnert||!t.datum||!t.von) return;
    const start=new Date(t.datum+'T'+t.von); if(isNaN(start)) return;
    if(now>=start){ t.erinnert=true; changed=true; return; }
    const remindAt=new Date(start.getTime()-t.erinnerung*60000);
    if(now>=remindAt){
      const inMin=Math.max(1,Math.round((start-now)/60000));
      const msg='Termin '+(inMin>=1440?'morgen':('in '+inMin+' Min.'))+': '+kalTitel(t)+' ('+t.von+' Uhr)';
      toast('🔔 '+msg, 8000);
      try{ if(typeof Notification!=='undefined' && Notification.permission==='granted') new Notification('Praxis Behringer', {body:msg}); }catch(err){}
      t.erinnert=true; changed=true;
    }
  });
  if(changed) saveData();
}
function notifErlauben(){
  if(typeof Notification==='undefined'){ alert('Benachrichtigungen werden von diesem Browser nicht unterstützt.'); return; }
  Notification.requestPermission().then(p=>{ toast(p==='granted'?'Benachrichtigungen aktiviert':'Benachrichtigungen nicht erlaubt'); render(); });
}

function erstelleMonatsabrechnung(monat){
  const a=state.abrechnendePraxis;
  if(!a.name){ alert('Bitte zuerst die abrechnende Praxis unter „Einstellungen“ hinterlegen.'); return; }
  const offene=state.rezepte.filter(r=>r.monat===monat && !r.abgerechnet);
  if(!offene.length){ alert('Keine offenen Rezepte in diesem Monat.'); return; }
  const summe=offene.reduce((s,r)=>s+(Number(r.betrag)||0),0);
  const anteil=Number(a.anteilProzent)||100;
  const anteilBetrag=Math.round(summe*anteil/100*100)/100;
  const zzVorOrt=Math.round(offene.filter(r=>r.zuzahlStatus==='vorOrt').reduce((s,r)=>s+(Number(r.zuzahlBetrag)||0),0)*100)/100;
  const zzPraxis=Math.round(offene.filter(r=>r.zuzahlStatus==='praxis').reduce((s,r)=>s+(Number(r.zuzahlBetrag)||0),0)*100)/100;
  const betragFinal=Math.round((anteilBetrag-zzVorOrt)*100)/100;
  if(!confirm(`Monatsabrechnung ${monthLabel(monat)} erstellen?\n\n${offene.length} Rezepte · Rezeptsumme ${fmtEUR(summe)}${anteil!==100?`\nAnteil ${anteil}% = ${fmtEUR(anteilBetrag)}`:''}${zzVorOrt>0?`\nabzüglich vor Ort vereinnahmter Zuzahlungen: −${fmtEUR(zzVorOrt)}`:''}\nRechnungsbetrag: ${fmtEUR(betragFinal)}${zzPraxis>0?`\n\nHinweis: ${fmtEUR(zzPraxis)} Zuzahlungen sind noch durch die Praxis bei Patienten zu erheben.`:''}`)) return;
  const pa={
    id:uid(), nummer:paNrFor(monat), monat, datum:todayISO(),
    rezeptIds:offene.map(r=>r.id), summe, anteilProzent:anteil,
    zuzahlungVorOrt:zzVorOrt, zuzahlungPraxis:zzPraxis,
    betrag:betragFinal, status:'offen'
  };
  offene.forEach(r=>{ r.abgerechnet=true; r.abrechnungId=pa.id; });
  state.praxisabrechnungen.push(pa);
  saveData(); render();
  doPrint(renderPraxisabrechnungDoc(pa));
}

/* ---------- Export / Import ---------- */
function exportDaten(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`Abrechnung_Behringer_Sicherung_${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function handleImportFile(file){
  if(!file) return;
  const fr=new FileReader();
  fr.onload=()=>{
    try{
      const d=JSON.parse(fr.result);
      if(!d || !d.praxis){ throw new Error('Unerwartetes Format'); }
      if(!confirm('Sicherung importieren? Die aktuellen Daten werden ersetzt.')) return;
      state=Object.assign(structuredClone(DEFAULT_DATA), d);
      saveData(); ui.view='dashboard'; render(); toast('Sicherung importiert');
    }catch(err){ alert('Import fehlgeschlagen: '+err.message); }
  };
  fr.readAsText(file);
}

/* ---------- Toast ---------- */
let toastTimer=null;
function toast(msg, ms){
  ms=ms||1800;
  let t=el('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1c1c1c;color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;z-index:80;box-shadow:0 8px 28px rgba(0,0,0,.25);opacity:0;transition:opacity .2s';
    document.body.appendChild(t);
  }
  t.textContent=msg; requestAnimationFrame(()=>{ t.style.opacity='1'; });
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.style.opacity='0'; },ms);
}
