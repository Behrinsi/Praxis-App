<style>
  :root{
    --bg:#f7f6f1; --paper:#ffffff;
    --ink:#1c1c1c; --soft:#3a3a3a; --muted:#8b8b8b;
    --accent:#8a8a5c; --accent-2:#a3a376; --accent-bg:#f3f3ea;
    --rule:#d9d9d4; --rule-soft:#ececea;
    --amber:#9a7b34; --amber-bg:#f6efdd;
    --green:#5f7148; --green-bg:#eef1e6;
    --danger:#9a4a3c;
    --serif:'Cormorant Garamond','Garamond','Times New Roman',serif;
    --sans:'Inter','Helvetica Neue',Arial,sans-serif;
    /* UI-only (wirken nicht auf den Druck) */
    --panel:#fbfbf8; --accent-weak:#eceadf; --line:#e7e6df; --danger-bg:#f7ece9;
    --shadow-sm:0 1px 2px rgba(30,30,20,.05),0 1px 3px rgba(30,30,20,.05);
    --shadow-md:0 6px 18px rgba(30,30,20,.07),0 2px 6px rgba(30,30,20,.05);
    --shadow-lg:0 24px 60px rgba(20,20,12,.18);
    --r-lg:18px; --r-md:12px; --r-sm:9px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  a{color:inherit}
  h1,h2,h3{margin:0}
  button{font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}

  .eyebrow{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--accent)}
  .display{font-family:var(--serif);font-style:italic;font-weight:500}

  /* ---------- App shell ---------- */
  .app-shell{max-width:1120px;margin:0 auto;padding:0 20px 96px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:24px 2px 18px}
  .brand{display:flex;align-items:center;gap:13px}
  .brand-mark{width:44px;height:44px;border-radius:13px;background:linear-gradient(150deg,#9a9a68,#7e7e52);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);flex:0 0 auto}
  .brand-dots{display:grid;grid-template-columns:repeat(2,5px);gap:4px}
  .brand-dots span{width:5px;height:5px;border-radius:50%;background:#f4f3ea}
  .brand-name{font-family:var(--serif);font-style:italic;font-weight:600;font-size:25px;line-height:1.05;color:var(--ink)}
  .brand-tag{font-size:9px;letter-spacing:2.6px;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .topbar .role{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-weak);padding:7px 13px;border-radius:999px;white-space:nowrap}

  /* ---------- Nav (Pills) ---------- */
  .nav{display:flex;gap:6px;margin-bottom:26px;overflow-x:auto;padding:6px;background:var(--paper);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow-sm);scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav button{background:none;border:none;padding:9px 15px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;border-radius:9px;transition:background .15s,color .15s}
  .nav button:hover{color:var(--soft);background:var(--accent-bg)}
  .nav button.active{color:#fff;background:var(--accent);box-shadow:var(--shadow-sm)}

  /* ---------- Cards ---------- */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px 26px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
  .card-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;border-bottom:1px solid var(--rule-soft);padding-bottom:14px;margin-bottom:20px}
  .card-head h2{font-family:var(--serif);font-style:italic;font-weight:600;font-size:24px;color:var(--ink);line-height:1.1}
  .card-head .sub{font-size:12.5px;color:var(--muted);margin-top:4px}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--accent);background:var(--accent);color:#fff;padding:9px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .15s,background .15s}
  .btn:hover{background:#7d7d52;box-shadow:var(--shadow-md);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-ghost{background:var(--paper);color:var(--accent);border-color:var(--line)}
  .btn-ghost:hover{background:var(--accent-bg);border-color:var(--accent-weak)}
  .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
  .btn-link{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12.5px;font-weight:500;padding:5px 8px;border-radius:7px;box-shadow:none;transition:background .15s}
  .btn-link:hover{background:var(--accent-bg)}
  .btn-link.danger{color:var(--danger)}
  .btn-link.danger:hover{background:var(--danger-bg)}
  .btn-row{display:flex;gap:9px;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--accent-bg);border:1px solid var(--line);border-radius:11px;padding:4px;gap:4px;max-width:100%;flex-wrap:wrap}
  .seg-btn{border:none;background:none;padding:8px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:8px;transition:background .15s,color .15s}
  .seg-btn.active{background:var(--paper);color:var(--accent);box-shadow:var(--shadow-sm)}

  /* ---------- Stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:8px}
  .stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-md);padding:20px 22px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent-2)}
  .stat .k{font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
  .stat .v{font-family:var(--serif);font-style:italic;font-weight:600;font-size:31px;color:var(--ink);line-height:1}
  .stat .d{font-size:12px;color:var(--muted);margin-top:7px}

  /* ---------- Tables ---------- */
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-md)}
  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
  table.tbl th{text-align:left;font-weight:500;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);padding:11px 14px;background:var(--panel);border-bottom:1px solid var(--rule);white-space:nowrap}
  table.tbl th.num,table.tbl td.num{text-align:right}
  table.tbl td{padding:12px 14px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
  table.tbl tbody tr{transition:background .12s}
  table.tbl tbody tr:hover{background:var(--accent-bg)}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl td.tnum{font-variant-numeric:tabular-nums}
  table.tbl .muted{color:var(--muted);font-size:12.5px}
  table.tbl .strong{color:var(--ink)}
  .row-actions{display:flex;gap:2px;justify-content:flex-end;flex-wrap:wrap}

  .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:500;letter-spacing:.2px}
  .badge.offen{background:var(--amber-bg);color:var(--amber)}
  .badge.bezahlt{background:var(--green-bg);color:var(--green)}
  .badge.neutral{background:var(--accent-bg);color:var(--muted)}

  /* ---------- Auswertung ---------- */
  .split-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}
  .split{display:flex;justify-content:space-between;align-items:baseline;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-md);padding:14px 16px}
  .split span{font-size:12px;letter-spacing:.3px;color:var(--muted)}
  .split strong{font-family:var(--serif);font-style:italic;font-weight:600;font-size:20px;color:var(--ink)}
  .sum-pill{background:var(--amber-bg);color:var(--amber);border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:500;white-space:nowrap}
  .bars{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .bar-row{display:flex;align-items:center;gap:12px}
  .bar-label{flex:0 0 34px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .bar-track{flex:1 1 auto;background:var(--accent-bg);border-radius:999px;height:18px;overflow:hidden}
  .bar-fill{height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));border-radius:999px}
  .bar-val{flex:0 0 100px;text-align:right;font-size:12.5px;color:var(--ink);font-variant-numeric:tabular-nums}

  .empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:13.5px}
  .empty .display{font-size:21px;color:var(--soft);font-style:italic;display:block;margin-bottom:6px}

  /* ---------- Forms ---------- */
  .field{margin-bottom:15px}
  .field>label{display:block;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);margin-bottom:6px;font-weight:500}
  .input,select.input,textarea.input{width:100%;border:1px solid var(--rule);border-radius:10px;padding:10px 13px;background:var(--paper);color:var(--ink);font-size:14px;transition:border-color .15s,box-shadow .15s}
  .input:focus,select.input:focus,textarea.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(138,138,92,.15)}
  textarea.input{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
  .hint{font-size:11.5px;color:var(--muted);margin-top:-8px;margin-bottom:12px;line-height:1.5}

  .subhead{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin:20px 0 10px;border-top:1px solid var(--rule-soft);padding-top:16px;font-weight:500}

  /* dynamic line rows */
  .line-row{display:grid;gap:8px;align-items:center;margin-bottom:8px}
  .line-row .input{margin:0}
  .li-termin{grid-template-columns:1fr 130px 36px}
  .li-pos{grid-template-columns:1fr 70px 110px 110px 36px}
  .li-rezpos{grid-template-columns:1fr 70px 110px 110px 36px}
  .line-head{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
  .icon-btn{border:1px solid var(--rule);background:var(--paper);color:var(--danger);border-radius:9px;width:36px;height:36px;cursor:pointer;font-size:15px;line-height:1;transition:background .15s}
  .icon-btn:hover{background:var(--danger-bg)}
  .sum-line{display:flex;justify-content:space-between;align-items:baseline;border-top:1.5px solid var(--ink);margin-top:14px;padding-top:12px}
  .sum-line .l{font-family:var(--serif);font-style:italic;font-weight:600;font-size:18px}
  .sum-line .v{font-family:var(--serif);font-style:italic;font-weight:600;font-size:21px;font-variant-numeric:tabular-nums}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(24,24,20,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:34px 16px;z-index:50;overflow-y:auto}
  .modal{background:var(--paper);border-radius:var(--r-lg);max-width:760px;width:100%;margin:auto;box-shadow:var(--shadow-lg);overflow:hidden}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 26px;border-bottom:1px solid var(--rule-soft)}
  .modal-head h3{font-family:var(--serif);font-style:italic;font-weight:600;font-size:23px}
  .modal-head .x{border:none;background:none;font-size:25px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px;border-radius:8px;transition:color .15s}
  .modal-head .x:hover{color:var(--ink)}
  .modal-body{padding:24px 26px;max-height:none}
  .modal-foot{display:flex;justify-content:space-between;gap:10px;padding:18px 26px;border-top:1px solid var(--rule-soft);background:var(--panel);flex-wrap:wrap}

  .collapse-toggle{font-size:12px;color:var(--accent);cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:6px;font-weight:500}
  .note-box{background:var(--accent-bg);border:1px solid var(--accent-weak);border-left:3px solid var(--accent);padding:13px 16px;border-radius:0 var(--r-sm) var(--r-sm) 0;font-size:12.5px;color:var(--soft);margin:14px 0;line-height:1.55}
  /* Kalender (eigene Terminplanung) */
  .cal-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .cal-title{font-family:var(--serif);font-style:italic;font-weight:600;font-size:22px;min-width:150px}
  .cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
  .cal-wd div{text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:2px 0}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-cell{position:relative;aspect-ratio:1/1;border:1px solid var(--rule-soft);border-radius:9px;background:var(--paper);cursor:pointer;padding:5px 6px;font-size:12.5px;color:var(--soft);transition:background .12s,border-color .12s;min-width:0}
  .cal-cell:hover{background:var(--accent-bg)}
  .cal-cell.out{visibility:hidden;pointer-events:none}
  .cal-cell.sel{background:var(--accent-bg);border-color:var(--accent)}
  .cal-cell .d{font-weight:500}
  .cal-cell.today .d{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff}
  .cal-dots{position:absolute;left:6px;right:6px;bottom:5px;display:flex;gap:3px;flex-wrap:wrap}
  .cal-dots span{width:5px;height:5px;border-radius:50%}
  .cal-dots .tt-patient{background:var(--accent)} .cal-dots .tt-arbeit{background:#7d8ba1} .cal-dots .tt-arzt{background:var(--amber)} .cal-dots .tt-sonstig{background:#b9b9b0}
  .day-item{display:flex;gap:12px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--rule-soft)}
  .day-item:last-child{border-bottom:none}
  .day-time{flex:0 0 86px;font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink);font-weight:500;line-height:1.45}
  .day-main{flex:1 1 auto;min-width:0}
  .day-main .t{font-size:13.5px;color:var(--ink)}
  .day-main .n{font-size:12px;color:var(--muted);margin-top:2px}
  .tt-badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:500;margin-left:6px;vertical-align:1px}
  .tt-badge.patient{background:var(--accent-bg);color:var(--accent)}
  .tt-badge.arbeit{background:#e8ecf2;color:#5a6b85}
  .tt-badge.arzt{background:var(--amber-bg);color:var(--amber)}
  .tt-badge.sonstig{background:var(--rule-soft);color:var(--muted)}
  .chip-row{display:flex;gap:7px;flex-wrap:wrap}
  .chip{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 13px;font-size:12.5px;color:var(--soft);cursor:pointer;transition:background .15s,border-color .15s}
  .chip:hover{background:var(--accent-bg);border-color:var(--accent-weak);color:var(--accent)}
  /* Rezept-Check */
  .li-check{grid-template-columns:1fr 90px}
  .check-flags{display:flex;flex-direction:column;gap:8px;margin:4px 0 6px}
  .check-flags label{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--soft);cursor:pointer}
  .check-flags input{width:16px;height:16px;accent-color:var(--accent);margin-top:1px;flex:0 0 auto}
  .check-banner{border-radius:var(--r-md);padding:13px 16px;font-size:13.5px;font-weight:500;margin:16px 0 10px}
  .check-banner.f{background:var(--danger-bg);color:var(--danger);border:1px solid #e8cfc8}
  .check-banner.w{background:var(--amber-bg);color:var(--amber);border:1px solid #ecdfc2}
  .check-banner.ok{background:var(--green-bg);color:var(--green);border:1px solid #dbe3cd}
  .check-list{display:flex;flex-direction:column;gap:7px}
  .check-item{display:flex;gap:10px;align-items:flex-start;font-size:12.8px;color:var(--soft);line-height:1.5}
  .check-badge{flex:0 0 62px;text-align:center;border-radius:999px;font-size:10.5px;font-weight:600;padding:3px 0;margin-top:1px}
  .check-badge.f{background:var(--danger-bg);color:var(--danger)}
  .check-badge.w{background:var(--amber-bg);color:var(--amber)}
  .check-badge.ok{background:var(--green-bg);color:var(--green)}
  .check-badge.i{background:var(--accent-bg);color:var(--muted)}
  .check-vorschlag{margin-top:14px;background:var(--accent-bg);border:1px solid var(--accent-weak);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;padding:12px 14px}
  .check-vorschlag .k{font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:7px}
  .check-vorschlag .vi{font-size:12.8px;color:var(--ink);line-height:1.5;margin-bottom:5px}
  .check-vorschlag .vd{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.45}
  .icd-res{border:1px solid var(--rule-soft);border-radius:10px;overflow:hidden;margin-top:2px}
  .icd-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--rule-soft);cursor:pointer;transition:background .12s}
  .icd-row:last-child{border-bottom:none}
  .icd-row:hover{background:var(--accent-bg)}
  .icd-row .code{flex:0 0 62px;font-weight:600;font-size:12.5px;color:var(--accent);font-variant-numeric:tabular-nums}
  .icd-row .nm{flex:1 1 auto;font-size:12.8px;color:var(--ink);line-height:1.35}
  .icd-row .tags{flex:0 0 auto;display:flex;gap:4px}
  .icd-row .tt-badge{margin-left:0}

  /* Rezept-Belege (Fotos) */
  .foto-count{font-family:var(--sans);font-style:normal;font-size:10px;letter-spacing:.4px;color:var(--muted);text-transform:none;margin-left:8px}
  .foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:10px;margin:8px 0 4px}
  .foto-grid.gallery{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .foto-thumb{position:relative;aspect-ratio:1/1;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);box-shadow:var(--shadow-sm)}
  .foto-thumb img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;display:block}
  .foto-x{position:absolute;top:5px;right:5px;width:24px;height:24px;border:none;border-radius:50%;background:rgba(24,24,20,.62);color:#fff;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .foto-x:hover{background:var(--danger)}
  .foto-add{position:relative;overflow:hidden;margin-top:2px}
  .foto-add input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
  .foto-overlay{position:fixed;inset:0;background:rgba(15,15,12,.9);display:flex;align-items:center;justify-content:center;z-index:80;padding:24px;cursor:zoom-out}
  .foto-overlay img{max-width:100%;max-height:100%;border-radius:6px;box-shadow:0 12px 44px rgba(0,0,0,.55)}
  .foto-overlay-x{position:fixed;top:16px;right:20px;width:42px;height:42px;border:none;border-radius:50%;background:rgba(255,255,255,.16);color:#fff;font-size:24px;cursor:pointer}

  /* Sicherheit: Topbar-Sperrbutton & Sperrbildschirm */
  .topbar-right{display:flex;align-items:center;gap:10px}
  .lock-top{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid var(--line);background:var(--paper);color:var(--accent);border-radius:10px;cursor:pointer;box-shadow:var(--shadow-sm);transition:background .15s}
  .lock-top:hover{background:var(--accent-bg)}
  .lock-screen{position:fixed;inset:0;z-index:100;background:linear-gradient(160deg,#f7f6f1,#e9e8dd);display:flex;align-items:center;justify-content:center;padding:24px}
  .lock-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:34px 30px;max-width:370px;width:100%;text-align:center}
  .lock-mark{margin:0 auto 18px;width:56px;height:56px;border-radius:16px}
  .lock-card h2{font-family:var(--serif);font-style:italic;font-weight:600;font-size:27px;color:var(--ink);line-height:1}
  .lock-sub{font-size:13px;color:var(--muted);margin:8px 0 22px}
  .lock-card .input{text-align:center;font-size:15px}
  .lock-err{color:var(--danger);font-size:12.5px;min-height:18px;margin-top:9px}
  .lock-hint{font-size:12px;color:var(--soft);margin-top:10px;background:var(--accent-bg);border:1px solid var(--accent-weak);border-radius:9px;padding:9px 11px}

  /* Sanfte Einblendung für Dialoge */
  @keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
  .modal{animation:modalIn .2s ease both}

  @media(max-width:680px){
    .app-shell{padding:0 14px 80px}
    .topbar{padding:18px 0 14px}
    .brand-name{font-size:22px}
    .topbar .role{display:none}
    .card{padding:18px 16px;border-radius:14px}
    .card-head{flex-wrap:wrap}
    .grid2,.grid3{grid-template-columns:1fr}
    .li-pos,.li-rezpos{grid-template-columns:1fr 1fr;}
    .li-pos .icon-btn,.li-rezpos .icon-btn{grid-column:span 2;width:100%}
    .li-termin{grid-template-columns:1fr 110px 36px}
  }
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* ================= PRINT DOCUMENT ================= */
  #print-root{display:none}
  @media screen{
    #print-root{display:none}
  }
  @media print{
    .app-shell,#modal-root{display:none!important}
    #print-root{display:block!important}
    @page{size:A4;margin:0}
    html,body{background:#fff}
  }
  .doc{width:210mm;min-height:297mm;padding:16mm 18mm 16mm;background:#fff;color:var(--ink);font-family:var(--sans);font-size:9.8pt;line-height:1.5;position:relative;margin:0 auto}
  .doc-pagemark{position:absolute;top:9mm;right:18mm;font-size:7.5pt;letter-spacing:1.8pt;text-transform:uppercase;color:var(--accent)}
  .doc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11mm}
  .doc-logo{display:flex;align-items:center;gap:6mm}
  .doc-logo .dots{display:grid;grid-template-columns:repeat(2,1.6mm);gap:1.3mm}
  .doc-logo .dots span{width:1.6mm;height:1.6mm;border-radius:50%;background:var(--accent-2)}
  .doc-logo .name{font-family:var(--serif);font-style:italic;font-weight:500;font-size:21pt;line-height:1;white-space:nowrap}
  .doc-logo .tag{margin-top:1.6mm;font-size:7pt;letter-spacing:2.4pt;text-transform:uppercase;color:var(--soft);white-space:nowrap}
  .doc-meta{text-align:right;font-size:8.5pt;color:var(--soft);line-height:1.5}
  .doc-dots{position:absolute;left:9mm;top:56mm;display:flex;flex-direction:column;gap:4mm}
  .doc-dots span{width:1.6mm;height:1.6mm;border-radius:50%;background:var(--accent-2);opacity:.85}
  .doc-dots span:nth-child(3){opacity:1}
  .doc-addr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8mm}
  .doc-addr .rcpt{line-height:1.5}
  .doc-addr .date{text-align:right;font-size:9pt;color:var(--soft)}
  .doc-section{display:flex;justify-content:space-between;align-items:baseline;border-bottom:.5pt solid var(--rule);padding-bottom:2.5mm;margin-bottom:5mm}
  .doc-section h1{font-family:var(--serif);font-style:italic;font-weight:500;font-size:22pt;line-height:1.1}
  .doc-section .eb{font-size:7pt;letter-spacing:2.2pt;text-transform:uppercase;color:var(--accent)}
  .doc-intro p{margin:0 0 2.5mm;color:var(--soft);font-size:9.4pt;line-height:1.5}
  .doc-intro .an{color:var(--ink);margin-bottom:3mm}
  .doc-dates{margin:3mm 0 5mm;columns:2;column-gap:12mm;font-variant-numeric:tabular-nums;font-size:9.4pt}
  .doc-dates .t{display:flex;gap:4mm;padding:.7mm 0;border-bottom:.3pt dotted var(--rule);break-inside:avoid}
  .doc-dates .t .n{color:var(--muted);min-width:16mm;font-size:8pt}
  table.doc-srv{width:100%;border-collapse:collapse;margin-top:2mm;font-size:9.8pt}
  table.doc-srv th{text-align:left;font-weight:400;font-size:7pt;letter-spacing:1.6pt;text-transform:uppercase;color:var(--accent);padding:2mm 0 1.5mm;border-bottom:.5pt solid var(--rule)}
  table.doc-srv th.n,table.doc-srv td.n{text-align:right}
  table.doc-srv td{padding:2.6mm 0;border-bottom:.4pt solid var(--rule-soft);vertical-align:top}
  table.doc-srv td.pos{color:var(--muted);font-size:8.5pt;width:11mm}
  table.doc-srv .ti{color:var(--ink)}
  table.doc-srv .su{display:block;font-size:8.2pt;color:var(--muted);margin-top:.4mm}
  table.doc-srv td.n{font-variant-numeric:tabular-nums}
  table.doc-srv td.qty{color:var(--muted);width:14mm}
  table.doc-srv td.pr{color:var(--muted);width:24mm;font-size:9.2pt}
  table.doc-srv td.tot{color:var(--ink);width:26mm;font-size:10.5pt}
  .doc-total{display:flex;justify-content:space-between;align-items:baseline;border-top:.6pt solid var(--ink);margin-top:4mm;padding-top:3mm}
  .doc-total .l{font-family:var(--serif);font-style:italic;font-size:13pt}
  .doc-total .v{font-size:13pt;font-variant-numeric:tabular-nums;letter-spacing:.3pt}
  .doc-sub{display:flex;justify-content:space-between;font-size:9.4pt;color:var(--soft);padding:1.3mm 0}
  .doc-pay{display:grid;grid-template-columns:26mm 1fr;gap:6mm;align-items:start;border-top:.5pt solid var(--rule);margin-top:5mm;padding-top:4mm}
  .doc-pay .qr img,.doc-pay .qr canvas{width:26mm;height:26mm;display:block}
  .doc-pay .qr .ql{margin-top:1.2mm;font-size:6.5pt;letter-spacing:2pt;text-transform:uppercase;color:var(--accent);text-align:center}
  .doc-pay .det{font-size:9pt}
  .doc-pay .det .nt{color:var(--ink);margin-bottom:2mm}
  .doc-pay .det table{border-collapse:collapse;margin-top:1mm}
  .doc-pay .det td{padding:.5mm 0;font-size:9pt;color:var(--ink)}
  .doc-pay .det td.k{color:var(--accent);font-size:7pt;letter-spacing:2pt;text-transform:uppercase;padding-right:5mm;width:26mm;vertical-align:middle}
  .doc-pay .det .iban{font-variant-numeric:tabular-nums;letter-spacing:.3pt}
  .doc-tax{margin-top:3mm;padding-top:2mm;font-size:8pt;color:var(--muted);border-top:.3pt dotted var(--rule)}
  .doc-sign{margin-top:4mm}
  .doc-sign .g{font-size:9.5pt}
  .doc-sign .s{font-family:var(--serif);font-style:italic;font-size:13pt;margin-top:.5mm}
  .doc-footer{position:absolute;left:18mm;right:18mm;bottom:10mm;display:grid;grid-template-columns:repeat(3,1fr);gap:8mm;border-top:.4pt solid var(--rule);padding-top:3mm;font-size:8pt;color:var(--muted)}
  .doc-footer .k{font-size:6.5pt;letter-spacing:2.2pt;text-transform:uppercase;color:var(--accent);margin-bottom:1.2mm;display:block}

  /* ---- Behandlungsvertrag (mehrseitig) ---- */
  .dc-page{break-after:page;page-break-after:always}
  .dc-doc{height:296mm}
  /* Anlage: Privatpreisliste (zweispaltig) */
  .doc .vk-intro{margin-bottom:4mm}
  .doc .vk-prices{column-count:2;column-gap:9mm;margin-top:1mm}
  .doc .vk-row{display:flex;justify-content:space-between;align-items:baseline;break-inside:avoid;padding:1.7mm 0;border-bottom:.4pt solid var(--rule-soft);font-size:9.3pt;line-height:1.3}
  .doc .vk-row .nm{color:var(--ink);flex:1 1 auto;min-width:0;padding-right:3mm}
  .doc .vk-row .nm .p{color:var(--muted);font-variant-numeric:tabular-nums;margin-right:1.5mm}
  .doc .vk-row .pr{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap;flex:0 0 auto}
  .doc .vk-note{font-size:8.3pt;color:var(--muted);margin-top:5mm;line-height:1.45}
  .doc .dc-intro p{margin:0 0 2.5mm;color:var(--soft);font-size:9.4pt;line-height:1.5}
  .doc .dc-intro .an{color:var(--ink);margin-bottom:3mm}
  .doc .dc-infobox{border-left:2pt solid var(--accent);padding:2.5mm 5mm;margin:3mm 0;font-size:9.2pt;color:var(--soft);line-height:1.45}
  .doc .dc-infobox .k{display:block;font-size:7pt;letter-spacing:2.4pt;text-transform:uppercase;color:var(--accent);margin-bottom:1mm}
  .doc .dc-patient{margin:5mm 0 6mm;border-top:.5pt solid var(--rule);border-bottom:.5pt solid var(--rule);padding:4mm 0;display:grid;grid-template-columns:1fr 1fr;gap:4mm 8mm;font-size:9pt}
  .doc .dc-patient .f{display:flex;align-items:baseline;gap:3mm}
  .doc .dc-patient .l{font-size:7pt;letter-spacing:2pt;text-transform:uppercase;color:var(--accent);min-width:24mm}
  .doc .dc-patient .v{flex:1;border-bottom:.4pt solid var(--rule);min-height:5mm;color:var(--ink);font-size:9.5pt}
  .doc .dc-clause{display:grid;grid-template-columns:14mm 1fr;margin:4mm 0;border-top:.4pt solid var(--rule-soft);padding-top:3mm;break-inside:avoid}

  ],

/* ---------- Persistenz ---------- */
const STORE_KEY = 'sb_abrechnung_v1';
let state = loadData();
const APP_VERSION = '10.4 · Juli 2026';
let ui = { view:'dashboard', rezeptMonth: currentYM(), auswertungJahr: currentYM().slice(0,4), kalMonat: currentYM(), kalTag: todayISO(), vertragTyp:'gkv', vertragData:{name:'',geb:'',anschrift:'',kasse:''} };
let edKalTermin = null, pendingKalDel = null;

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const d = JSON.parse(raw); return Object.assign(structuredClone(DEFAULT_DATA), d); }
  }catch(e){ console.warn('Laden fehlgeschlagen', e); }
  return structuredClone(DEFAULT_DATA);
}
function saveData(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ alert('Speichern fehlgeschlagen: '+e.message+'\n\nBitte exportieren Sie Ihre Daten als Sicherung.'); }
}

/* ---------- Helfer ---------- */
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const eur = new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'});
function fmtEUR(n){ return eur.format(Number(n)||0); }
function pad2(n){ return String(n).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function currentYM(){ return todayISO().slice(0,7); }
function fmtDate(iso){ if(!iso) return ''; const p=iso.split('-'); return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:iso; }
function fmtDateLong(iso){ if(!iso) return ''; const p=iso.split('-'); if(p.length!==3) return iso; return `${parseInt(p[2],10)}. ${MONTHS[parseInt(p[1],10)-1]} ${p[0]}`; }
function monthLabel(ym){ if(!ym) return ''; const p=ym.split('-'); return `${MONTHS[parseInt(p[1],10)-1]} ${p[0]}`; }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function parseNum(s){
  if(typeof s==='number') return s;
  if(s==null||s==='') return 0;
  s=String(s).replace(/[€\s]/g,'').trim();
  if(s.indexOf(',')>-1) s=s.replace(/\./g,'').replace(',','.');
  const n=parseFloat(s); return isNaN(n)?0:n;
}
function el(id){ return document.getElementById(id); }
function val(id){ const e=el(id); return e?e.value.trim():''; }

function rechnungSumme(r){ return (r.positionen||[]).reduce((s,p)=>s+(Number(p.anzahl)||0)*(Number(p.einzel)||0),0); }
function totalEinheiten(termine){ return (termine||[]).reduce((s,t)=>s+(Number(t.einheiten)||1),0); }
function terminLabels(termine){
  let c=0; const out=[];
  (termine||[]).forEach(t=>{
    const e=Number(t.einheiten)||1; const start=c+1; const end=c+e; c=end;
    out.push({label: e>1?`${pad2(start)} – ${pad2(end)}`:pad2(start), datum:t.datum});
  });
  return out;
}
function nextPrivatNr(datum){
  const yy=(datum||todayISO()).slice(2,4);
  return `R${yy}-${pad2((state.counters.privat||0)+1).padStart(3,'0')}`;
}
function paNrFor(monat){
  let base=`PA-${monat}`;
  const existing=state.praxisabrechnungen.filter(p=>p.nummer===base||p.nummer.startsWith(base+'-')).length;
  return existing?`${base}-${existing+1}`:base;
}

  else if(v==='privat') html=viewPrivat();
  else if(v==='kalender') html=viewKalender();
  else if(v==='rezepte') html=viewRezepte();
  else if(v==='vertraege') html=viewVertraege();

/* ---------- Übersicht ---------- */
/* ---------- Auswertung: Umsatz & offene Posten ---------- */
function viewAuswertung(){
  const yset={};
  state.rechnungen.forEach(r=>{ if(r.datum) yset[r.datum.slice(0,4)]=1; });
  state.praxisabrechnungen.forEach(p=>{ if(p.datum) yset[p.datum.slice(0,4)]=1; });
  const curY=currentYM().slice(0,4); yset[curY]=1;
  const years=Object.keys(yset).sort().reverse();
  const Y=(ui.auswertungJahr && yset[ui.auswertungJahr]) ? ui.auswertungJahr : curY;

  const pr=state.rechnungen.filter(r=>(r.datum||'').slice(0,4)===Y);
  const pa=state.praxisabrechnungen.filter(p=>(p.datum||'').slice(0,4)===Y);
  const prSum=pr.reduce((s,r)=>s+rechnungSumme(r),0);
  const paSum=pa.reduce((s,p)=>s+(Number(p.betrag)||0),0);
  const total=prSum+paSum;
  const bezahlt=pr.filter(r=>r.status==='bezahlt').reduce((s,r)=>s+rechnungSumme(r),0)
              + pa.filter(p=>p.status==='bezahlt').reduce((s,p)=>s+(Number(p.betrag)||0),0);
  const offenJ=total-bezahlt;
  const quote=total>0?Math.round(bezahlt/total*100):0;

  let maxM=0; const months=[];
  for(let m=1;m<=12;m++){
    const mm=(''+m).padStart(2,'0');
    const b=pr.filter(r=>(r.datum||'').slice(5,7)===mm).reduce((s,r)=>s+rechnungSumme(r),0)
           +pa.filter(p=>(p.datum||'').slice(5,7)===mm).reduce((s,p)=>s+(Number(p.betrag)||0),0);
    months.push({lab:MONTHS[m-1], b}); if(b>maxM) maxM=b;
  }

  const heute=todayISO();
  const op=[];
  state.rechnungen.filter(r=>r.status!=='bezahlt').forEach(r=>op.push({typ:'rechnung', id:r.id, faellig:r.zahlungsziel||'', nummer:r.nummer, emp:r.name||'—', betrag:rechnungSumme(r)}));
  state.praxisabrechnungen.filter(p=>p.status!=='bezahlt').forEach(p=>op.push({typ:'pa', id:p.id, faellig:addDays(p.datum, state.praxis.zahlungszielTage||14), nummer:p.nummer, emp:(state.abrechnendePraxis.name||'Praxisabrechnung'), betrag:Number(p.betrag)||0}));
  op.sort((a,b)=>(a.faellig||'').localeCompare(b.faellig||''));
  const opSum=op.reduce((s,x)=>s+x.betrag,0);

  return `
  <div class="card">
    <div class="card-head">
      <div><h2>Auswertung ${esc(Y)}</h2><div class="sub">Umsatz nach Rechnungsdatum · bezahlt und offen</div></div>
      <div class="field" style="margin:0;min-width:110px">
        <select class="input" id="ausw-jahr">${years.map(y=>`<option value="${y}" ${y===Y?'selected':''}>${y}</option>`).join('')}</select>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="k">Berechnet ${esc(Y)}</div><div class="v">${fmtEUR(total)}</div><div class="d">${pr.length+pa.length} Rechnungen</div></div>
      <div class="stat"><div class="k">Davon bezahlt</div><div class="v">${fmtEUR(bezahlt)}</div><div class="d">${quote} % eingegangen</div></div>
      <div class="stat"><div class="k">Davon offen</div><div class="v">${fmtEUR(offenJ)}</div><div class="d">noch ausstehend</div></div>
    </div>
    <div class="split-row">
      <div class="split"><span>Privatrechnungen</span><strong>${fmtEUR(prSum)}</strong></div>
      <div class="split"><span>Praxisabrechnungen (GKV)</span><strong>${fmtEUR(paSum)}</strong></div>
    </div>
    <div class="btn-row" style="margin-top:14px"><button class="btn btn-ghost" data-action="export-umsatz" data-jahr="${esc(Y)}">Jahresübersicht ${esc(Y)} als CSV exportieren</button></div>
    <div class="hint">Umsatz ist nach Rechnungsdatum gruppiert. Für die steuerliche Zuordnung nach Zahlungseingang sind die Kontoauszüge maßgeblich.</div>
  </div>

  <div class="card">
    <div class="card-head"><div><h2>Monatsverlauf ${esc(Y)}</h2><div class="sub">Berechneter Umsatz je Monat</div></div></div>
    ${total>0 ? `<div class="bars">
      ${months.map(mo=>{ const w=mo.b>0?Math.max(3,Math.round(mo.b/maxM*100)):0; return `
        <div class="bar-row">
          <div class="bar-label">${mo.lab.slice(0,3)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
          <div class="bar-val">${mo.b>0?fmtEUR(mo.b):'–'}</div>
        </div>`; }).join('')}
    </div>` : `<div class="empty">Für ${esc(Y)} sind noch keine Rechnungen erfasst.</div>`}
  </div>

  <div class="card">
    <div class="card-head">
      <div><h2>Offene Posten</h2><div class="sub">Alle unbezahlten Rechnungen, nach Fälligkeit</div></div>
      ${op.length?`<div class="sum-pill">${fmtEUR(opSum)} offen</div>`:''}
    </div>
    ${op.length ? `<div class="table-wrap"><table class="tbl">
      <thead><tr><th>Fällig</th><th>Nummer</th><th>Empfänger</th><th class="num">Betrag</th><th>Status</th><th></th></tr></thead>
      <tbody>
        ${op.map(x=>{ const d=x.faellig?daysBetween(x.faellig,heute):0; const ueber=d>0; return `
          <tr>
            <td>${x.faellig?esc(fmtDate(x.faellig)):'—'}</td>
            <td>${esc(x.nummer)}</td>
            <td>${esc(x.emp)}</td>
            <td class="num tnum">${fmtEUR(x.betrag)}</td>
            <td>${ueber?`<span class="badge offen">${d} T. überfällig</span>`:`<span class="badge neutral">offen</span>`}</td>
            <td class="row-actions">
              <button class="btn-link" data-action="${x.typ==='rechnung'?'mahnung-rechnung':'mahnung-pa'}" data-id="${x.id}">Erinnerung</button>
              <button class="btn-link" data-action="${x.typ==='rechnung'?'print-rechnung':'print-pa'}" data-id="${x.id}">PDF</button>
              <button class="btn-link" data-action="${x.typ==='rechnung'?'toggle-status':'toggle-pa-status'}" data-id="${x.id}">✓ Bezahlt</button>
            </td>
          </tr>`; }).join('')}
      </tbody>
    </table></div>` : `<div class="empty">Keine offenen Posten – alles ist bezahlt.</div>`}
  </div>`;
}

function exportUmsatzCSV(jahr){
  const items=[];
  state.rechnungen.filter(r=>(r.datum||'').slice(0,4)===jahr).forEach(r=>items.push({iso:r.datum, nr:r.nummer, emp:r.name||'', art:'Privatrechnung', betrag:rechnungSumme(r), status:r.status}));
  state.praxisabrechnungen.filter(p=>(p.datum||'').slice(0,4)===jahr).forEach(p=>items.push({iso:p.datum, nr:p.nummer, emp:(state.abrechnendePraxis.name||'Praxisabrechnung'), art:'Praxisabrechnung '+monthLabel(p.monat), betrag:Number(p.betrag)||0, status:p.status}));
  items.sort((a,b)=>(a.iso||'').localeCompare(b.iso||''));
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[['Datum','Rechnungs-Nr','Empfänger/Patient','Art','Betrag (EUR)','Status'].map(q).join(';')];
  let sum=0;
  items.forEach(it=>{ sum+=it.betrag; lines.push([fmtDate(it.iso), it.nr, it.emp, it.art, it.betrag.toFixed(2).replace('.',','), it.status==='bezahlt'?'bezahlt':'offen'].map(q).join(';')); });
  lines.push(['','','','Summe '+jahr, sum.toFixed(2).replace('.',','), ''].map(q).join(';'));
  const csv='\ufeff'+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='Umsatz_Behringer_'+jahr+'.csv';
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast('CSV exportiert');
}

function monthOptions(){
  const set=new Set([currentYM(), ui.rezeptMonth]);
  state.rezepte.forEach(r=>set.add(r.monat));
  state.praxisabrechnungen.forEach(p=>set.add(p.monat));
  // letzte 12 Monate ergänzen
  const d=new Date(); d.setDate(1);
  for(let i=0;i<12;i++){ set.add(`${d.getFullYear()}-${pad2(d.getMonth()+1)}`); d.setMonth(d.getMonth()-1); }
  return [...set].filter(Boolean).sort().reverse();
}

const KAL_TYPEN={patient:'Behandlung', arbeit:'Arbeitszeit', arzt:'Arzttermin', sonstig:'Sonstiges'};
function kalTypLabel(t){ return KAL_TYPEN[t]||'Termin'; }
function kalTitel(t){ return t.typ==='patient' ? (t.patient||'Behandlung') : (t.titel||kalTypLabel(t.typ)); }
function kalAm(datum){ return (state.kalender||[]).filter(t=>t.datum===datum).sort((a,b)=>(a.von||'').localeCompare(b.von||'')); }

function viewKalender(){
  const ym=ui.kalMonat||currentYM();

  for(let i=0;i<startIdx;i++) cells+='<div class="cal-cell out"></div>';
  for(let d=1;d<=dim;d++){

    const ts=kalAm(iso);

        <div class="modal-head"><h3>${title}</h3><button class="x" data-action="close-modal" aria-label="Schließen">×</button></div>
        <div class="modal-body" id="modal-body">${bodyHTML}</div>
        <div class="modal-foot">${footHTML}</div>

/* ---------- Rechnungsformular ---------- */
function openRechnungForm(existing, prefill){
  if(existing){
    edRechnung=structuredClone(existing);
  }else{
    const datum=todayISO();
    edRechnung={
      id:uid(), nummer:nextPrivatNr(datum), datum,
      anrede:'Frau', name:'', strasse:'', plzOrt:'',
      arzt:'', diagnose:'', verordnungDatum:'',
      termine:[], positionen:[],
      zahlungsziel:addDays(datum, state.praxis.zahlungszielTage||14), status:'offen', _new:true
    };
    if(prefill){
      if(prefill.name) edRechnung.name=prefill.name;
      if(prefill.termine && prefill.termine.length) edRechnung.termine=prefill.termine;
    }
  }
  openModal(existing?'Rechnung bearbeiten':'Neue Privatrechnung', rechnungFormBody(),
    `<button class="btn-link" data-action="close-modal">Abbrechen</button>
     <button class="btn" data-action="save-rechnung">Rechnung speichern</button>`);
}
function rechnungFormBody(){
  const e=edRechnung;
  const catOpts=state.leistungen.map(l=>`<option value="${esc(l.pos)}">${esc(l.pos)} · ${esc(l.name)}</option>`).join('');
  return `
    <div class="grid3">
      <div class="field"><label>Rechnungs-Nr.</label><input class="input" id="f-nummer" value="${esc(e.nummer)}"></div>
      <div class="field"><label>Rechnungsdatum</label><input class="input" type="date" id="f-datum" value="${esc(e.datum)}"></div>

        <select class="input" id="f-anrede">
          <option ${e.anrede==='Frau'?'selected':''}>Frau</option>
          <option ${e.anrede==='Herr'?'selected':''}>Herr</option>
          <option ${e.anrede===''?'selected':''} value=""></option>
        </select></div>
      <div class="field" style="grid-column:span 2"><label>Name</label><input class="input" id="f-name" value="${esc(e.name)}"></div>
    </div>

      <div class="field"><label>Straße / Hausnr.</label><input class="input" id="f-strasse" value="${esc(e.strasse)}"></div>
      <div class="field"><label>PLZ / Ort</label><input class="input" id="f-plzOrt" value="${esc(e.plzOrt)}"></div>

    <div class="grid2">
      <div class="field"><label>Verordnende Praxis / Arzt</label><input class="input" id="f-arzt" value="${esc(e.arzt)}"></div>

    <div id="termine-list">${termineRows()}</div>

    <div class="subhead">Leistungen</div>

function termineRows(){
  const e=edRechnung;
  if(!e.termine.length) return `<div class="hint">Noch keine Termine erfasst.</div>`;
  return `<div class="line-row li-termin line-head"><div>Datum</div><div>Einheiten</div><div></div></div>`+
    e.termine.map((t,i)=>`
    <div class="line-row li-termin">
      <input class="input" type="date" data-tf="datum" data-i="${i}" value="${esc(t.datum)}">
      <input class="input" type="number" min="1" max="9" data-tf="einheiten" data-i="${i}" value="${esc(t.einheiten||1)}">
      <button class="icon-btn" data-action="del-termin" data-i="${i}" aria-label="Termin entfernen">×</button>
    </div>`).join('');
}
function posRows(){
  const e=edRechnung;
  if(!e.positionen.length) return `<div class="hint">Noch keine Leistungen hinzugefügt.</div>`;
  return `<div class="line-row li-pos line-head"><div>Leistung</div><div>Pos.</div><div>Anzahl</div><div>Einzelpreis</div><div></div></div>`+
    e.positionen.map((p,i)=>`
    <div class="line-row li-pos">
      <div><input class="input" data-pf="name" data-i="${i}" value="${esc(p.name)}"><input class="input" data-pf="sub" data-i="${i}" value="${esc(p.sub||'')}" style="margin-top:5px;font-size:12px;color:var(--muted)" placeholder="Beschreibung"></div>
      <input class="input" data-pf="pos" data-i="${i}" value="${esc(p.pos||'')}">
      <input class="input" type="number" min="0" step="1" data-pf="anzahl" data-i="${i}" value="${esc(p.anzahl)}">
      <input class="input" inputmode="decimal" data-pf="einzel" data-i="${i}" value="${String(p.einzel).replace('.',',')}">
      <button class="icon-btn" data-action="del-pos" data-i="${i}" aria-label="Leistung entfernen">×</button>
    </div>`).join('');
}
function syncRechnungForm(){
  const e=edRechnung; if(!e) return;
  e.nummer=val('f-nummer'); e.datum=val('f-datum'); e.zahlungsziel=val('f-zahlungsziel');
  e.anrede=val('f-anrede'); e.name=val('f-name'); e.strasse=val('f-strasse'); e.plzOrt=val('f-plzOrt');
  e.arzt=val('f-arzt'); e.verordnungDatum=val('f-vdatum'); e.diagnose=val('f-diagnose');
  document.querySelectorAll('[data-tf]').forEach(inp=>{
    const i=+inp.dataset.i, f=inp.dataset.tf;
    if(!e.termine[i]) return;
    e.termine[i][f]= f==='einheiten'?(parseInt(inp.value,10)||1):inp.value;
  });
  document.querySelectorAll('[data-pf]').forEach(inp=>{
    const i=+inp.dataset.i, f=inp.dataset.pf;
    if(!e.positionen[i]) return;
    if(f==='anzahl') e.positionen[i][f]=parseInt(inp.value,10)||0;
    else if(f==='einzel') e.positionen[i][f]=parseNum(inp.value);
    else e.positionen[i][f]=inp.value;
  });
}
function refreshRechnungForm(){ el('modal-body').innerHTML=rechnungFormBody(); }

  if(existing){ edRezept=structuredClone(existing); edRezept.fotos=[]; edRezept._fotosLoading = (existing.fotoCount>0); }
  else{
    const datum=todayISO();
    edRezept={ id:uid(), datum, ausstellungsdatum:'', monat:datum.slice(0,7), patient:'', rezeptNr:'', betrag:0, zuzahlStatus:'vorOrt', zuzahlBetrag:0, positionen:[], notiz:'', abgerechnet:false, fotoCount:0, fotos:[], _new:true };
  }
  openModal(existing?'Rezept bearbeiten':'Rezept erfassen', rezeptFormBody(),
    `<button class="btn-link" data-action="close-modal">Abbrechen</button>
     <button class="btn" data-action="save-rezept">Rezept speichern</button>`);
  if(existing && existing.fotoCount>0){
    fotosLoad(existing.id).then(arr=>{ if(edRezept && edRezept.id===existing.id){ edRezept.fotos=arr; edRezept._fotosLoading=false; refreshFotoStrip(); } });

}

  const e=edRezept; if(!e) return;

  e.notiz=val('rz-notiz'); e.betrag=parseNum(val('rz-betrag'));
  e.zuzahlStatus=val('rz-zzstatus'); e.zuzahlBetrag=parseNum(val('rz-zzbetrag'));
  document.querySelectorAll('[data-rpf]').forEach(inp=>{
    const i=+inp.dataset.i, f=inp.dataset.rpf; if(!e.positionen[i]) return;
    if(f==='anzahl') e.positionen[i][f]=parseInt(inp.value,10)||0;
    else if(f==='satz') e.positionen[i][f]=parseNum(inp.value);
    else e.positionen[i][f]=inp.value;
  });
}

function makeQR(text,sizePx){
  if(typeof QRCode==='undefined') return '';
  try{
    const tmp=document.createElement('div');
    new QRCode(tmp,{text,width:sizePx,height:sizePx,correctLevel:QRCode.CorrectLevel.M});
    const c=tmp.querySelector('canvas');
    if(c) return c.toDataURL('image/png');
    const img=tmp.querySelector('img');
    if(img&&img.src) return img.src;
  }catch(e){ console.warn('QR-Fehler',e); }
  return '';
}
function epcPayload(name,iban,bic,amount,text){
  return ['BCD','002','1','SCT',(bic||'').replace(/\s+/g,''),name||'',(iban||'').replace(/\s+/g,''),'EUR'+(Number(amount)||0).toFixed(2),'','',text||''].join('\n');
}

      : 'vielen Dank für Ihr Vertrauen in meine Praxis. Mit diesem Vertrag werden die wesentlichen Rahmenbedingungen für Ihre physiotherapeutische Behandlung als Privatpatientin, Privatpatient oder Selbstzahlerin bzw. Selbstzahler festgehalten. Bitte lesen Sie die folgenden Punkte aufmerksam durch und bestätigen Sie diese mit Ihrer Unterschrift auf der letzten Seite.',
    grundlageK:'Vertragsgrundlage',

      : `Behandlungsvertrag gemäß §§ 630a ff. BGB. Vertragspartner sind ausschließlich die Praxis ${nm}, ${str}, ${plz}, und die Patientin / der Patient.`,

    s1h:'Vertragsgegenstand',
    s1: gkv
      ? 'Die Praxis erbringt physiotherapeutische Heilmittelleistungen auf Grundlage einer ärztlichen Verordnung gemäß § 32 SGB V. Die Leistungen werden, soweit verordnungsfähig, direkt mit der zuständigen gesetzlichen Krankenversicherung abgerechnet. Bestandteil dieses Vertrages sind die gesetzlichen Bestimmungen des Sozialgesetzbuches V sowie die jeweils gültigen Rahmenverträge zwischen den Heilmittelverbänden und dem GKV-Spitzenverband.'
      : 'Die Praxis erbringt physiotherapeutische Leistungen auf Grundlage einer ärztlichen oder heilpraktischen Verordnung oder als Selbstzahlerleistung. Die Leistungen werden nach der gültigen Privatpreisliste der Praxis berechnet und sind von der Patientin / dem Patienten selbst zu tragen. Eine etwaige Erstattung durch eine private Krankenversicherung, Beihilfe oder Zusatzversicherung erfolgt im Verhältnis zwischen der Patientin / dem Patienten und dem jeweiligen Kostenträger; sie berührt die Zahlungspflicht gegenüber der Praxis nicht.',
    s2h: gkv?'Heilmittelverordnung':'Behandlungsgrundlage und Verordnung',

      : 'Liegt eine ärztliche oder heilpraktische Verordnung vor, bildet diese die fachliche Grundlage der Behandlung. Bei Selbstzahlerleistungen ohne Verordnung erfolgt die Behandlung auf Wunsch der Patientin / des Patienten nach physiotherapeutischer Befunderhebung. Über Art, Umfang und voraussichtliche Kosten der Behandlung wird vor deren Beginn aufgeklärt.',
    s3h:'Termine und Pünktlichkeit',
    s3:'Behandlungstermine werden individuell vereinbart und sind für beide Vertragsparteien verbindlich. Bei verspätetem Erscheinen verkürzt sich die Behandlungszeit entsprechend; eine Verlängerung über den vereinbarten Endzeitpunkt hinaus ist aus organisatorischen Gründen nicht möglich. Die volle vereinbarte Behandlungseinheit gilt dennoch als erbracht.',

    s4p2: gkv

      : 'Das Ausfallhonorar ist ein zivilrechtlicher Schadenersatzanspruch (§§ 280, 615 BGB) für den nicht anderweitig vergebbaren Termin und wird <strong>nicht</strong> von einer Krankenversicherung oder Beihilfe erstattet. Es ist von der Patientin / dem Patienten persönlich zu tragen.',
    s4p3:'Bei nachweislich unverschuldeter Verhinderung – insbesondere akuter Erkrankung mit ärztlichem Attest, schwerer Erkrankung oder Tod naher Angehöriger oder Unfall – entfällt das Ausfallhonorar.',
    s5h: gkv?'Zuzahlung gesetzlich Versicherter':'Honorar und Zahlung',
    s5: gkv
      ? 'Erwachsene gesetzlich Versicherte leisten gemäß § 32 Abs. 4 i.V.m. § 61 SGB V eine gesetzliche Zuzahlung von <strong>10 % der Behandlungskosten zuzüglich 10,00 € je Verordnung</strong>. Die Zuzahlung ist spätestens nach Abschluss der Behandlungsserie fällig und kann auf Wunsch auch zu Behandlungsbeginn entrichtet werden. Bescheinigungen über die Befreiung von der Zuzahlungspflicht sind unaufgefordert vor Behandlungsbeginn vorzulegen. Patientinnen und Patienten bis zur Vollendung des 18. Lebensjahres sind von der Zuzahlung befreit.'

    s6h:'Mitwirkungspflichten',

    s7h:'Datenschutz und Schweigepflicht',
    s7:`Die Erhebung, Verarbeitung und Speicherung Ihrer personen- und behandlungsbezogenen Daten erfolgt ausschließlich zum Zweck der Therapiedurchführung, Dokumentation und Abrechnung gemäß DSGVO und BDSG. Die Praxis und ihre Mitarbeitenden unterliegen der Schweigepflicht nach § 203 StGB. Eine Datenweitergabe erfolgt ausschließlich an ${gkv?'die zuständige Krankenkasse, ':''}die verordnende Ärztin / den verordnenden Arzt sowie die mit der Abrechnung beauftragte Stelle. Über Ihre Betroffenenrechte nach Art. 12 ff. DSGVO informiert Sie ein gesondertes Merkblatt.`,
    s8h:'Vertragsdauer und Schlussbestimmungen',
    s8:`Diese Vereinbarung gilt für die laufende ${gkv?'Verordnung':'Behandlung'} sowie für alle Folgebehandlungen, bis sie schriftlich widerrufen wird. Mündliche Nebenabreden bestehen nicht. Sollte eine Bestimmung unwirksam sein, bleibt die Wirksamkeit der übrigen unberührt. Es gilt deutsches Recht; Gerichtsstand ist – soweit gesetzlich zulässig – ${gs}.`,

/* ---------- Zahlungserinnerung / Mahnung ---------- */
function daysBetween(aIso,bIso){
  const a=new Date(aIso+'T00:00:00'), b=new Date(bIso+'T00:00:00');
  return Math.round((b-a)/86400000);
}
function mahnDataFromRechnung(r){
  return {
    empfaenger: [r.anrede, r.name, r.strasse, 'D '+r.plzOrt].filter(Boolean),
    anrede: (r.anrede==='Herr'?'Sehr geehrter Herr ':'Sehr geehrte Frau ')+esc(lastName(r.name))+',',
    nummer: r.nummer, rechnungDatum: r.datum, faelligkeit: r.zahlungsziel||'', betrag: rechnungSumme(r),
    verwendung: 'Rechnung '+r.nummer+' · '+initialsName(r.name)
  };
}
function mahnDataFromPA(pa){
  const a=state.abrechnendePraxis;
  return {
    empfaenger: [a.name, a.zusatz, a.ansprechpartner?('z. Hd. '+a.ansprechpartner):'', a.strasse, 'D '+a.plzOrt].filter(Boolean),
    anrede: 'Sehr geehrte Damen und Herren,',
    nummer: pa.nummer, rechnungDatum: pa.datum, faelligkeit: addDays(pa.datum, state.praxis.zahlungszielTage||14), betrag: pa.betrag,
    verwendung: pa.nummer+' · '+monthLabel(pa.monat)
  };
}
function renderMahnungDoc(m){
  const titel = m.level==='mahnung2' ? '2. Mahnung' : (m.level==='mahnung1' ? '1. Mahnung' : 'Zahlungserinnerung');
  const gebuehr = Number(m.gebuehr)||0;
  const gesamt = (Number(m.betrag)||0) + gebuehr;
  const ueberfaellig = (m.faelligkeit && m.datum) ? daysBetween(m.faelligkeit, m.datum) : 0;
  let intro;
  if(m.level==='mahnung2'){
    intro = 'leider konnte ich auch nach erneuter Erinnerung keinen Zahlungseingang für die unten aufgeführte Rechnung feststellen. Ich fordere Sie hiermit letztmalig auf, den offenen Betrag bis zum unten genannten Termin zu begleichen. Andernfalls behalte ich mir weitere Schritte vor.';
  } else if(m.level==='mahnung1'){
    intro = 'trotz meiner Zahlungserinnerung konnte ich bislang keinen Zahlungseingang für die unten aufgeführte Rechnung feststellen. Ich bitte Sie, den offenen Betrag nunmehr zeitnah auszugleichen.';
  } else {
    intro = 'sicher ist es Ihrer Aufmerksamkeit entgangen: Die unten aufgeführte Rechnung ist bislang noch offen. Ich möchte Sie freundlich an den Ausgleich erinnern.';
  }
  const crossNote = (m.level==='erinnerung')
    ? '<p>Sollte sich Ihre Zahlung mit diesem Schreiben überschnitten haben, betrachten Sie diese Erinnerung bitte als gegenstandslos.</p>' : '';
  const breakdown = gebuehr>0
    ? `<div class="doc-sub" style="border-top:.5pt solid var(--rule);margin-top:3mm;padding-top:2.5mm"><span>Offener Rechnungsbetrag</span><span>${fmtEUR(m.betrag)}</span></div>
       <div class="doc-sub"><span>Mahngebühr</span><span>${fmtEUR(gebuehr)}</span></div>
       <div class="doc-total"><span class="l">Offener Gesamtbetrag</span><span class="v">${fmtEUR(gesamt)}</span></div>`
    : `<div class="doc-total"><span class="l">Offener Betrag</span><span class="v">${fmtEUR(gesamt)}</span></div>`;
  return `<div class="doc dc-doc">
    <div class="doc-pagemark">${esc(titel)} · 01 / 01</div>
    ${docHeader()}
    <div class="doc-addr">
      <div class="rcpt">${m.empfaenger.map(x=>esc(x)).join('<br>')}</div>
      <div class="date">${esc(fmtDateLong(m.datum))}</div>
    </div>
    <div class="doc-section"><h1>${esc(titel)}</h1><span class="eb">Zu Rechnung ${esc(m.nummer)}</span></div>
    <div class="doc-intro">
      <p class="an">${m.anrede}</p>
      <p>${intro}</p>
    </div>
    <div class="dc-restate">
      <div class="doc-sub"><span>Rechnungsnummer</span><span>${esc(m.nummer)}</span></div>
      <div class="doc-sub"><span>Rechnungsdatum</span><span>${esc(fmtDate(m.rechnungDatum))}</span></div>
      ${m.faelligkeit?`<div class="doc-sub"><span>Ursprünglich fällig am</span><span>${esc(fmtDate(m.faelligkeit))}${ueberfaellig>0?` · seit ${ueberfaellig} Tagen überfällig`:''}</span></div>`:''}
    </div>
    ${breakdown}
    ${crossNote?`<div class="doc-intro" style="margin-top:3mm">${crossNote}</div>`:''}
    ${docPay(gesamt, m.verwendung, m.frist)}
    <div class="doc-sign"><div class="g">Mit freundlichen Grüßen</div><div class="s">${esc(state.praxis.name)}</div></div>
    ${docFooter(`${fmtDateLong(m.datum)}\u2003·\u2003${esc(titel)}`)}
  </div>`;
}

  if(t.id==='t-typ'){ const p=el('t-wrap-patient'), ti=el('t-wrap-titel'); if(p&&ti){ const isP=t.value==='patient'; p.style.display=isP?'':'none'; ti.style.display=isP?'none':''; } }
  if(t.id==='t-repeat'){ const w=el('t-wrap-repeatbis'); if(w) w.style.display=(t.value==='w')?'':'none'; }
  if(t.id==='import-file'){ handleImportFile(t.files[0]); }

  if(t.id==='ck-suche'){ renderIcdSuche(t.value); }
});
document.addEventListener('input', e=>{
  const t=e.target;
  // Rechnungsbetrag live aktualisieren
  if(t.dataset && (t.dataset.pf==='anzahl'||t.dataset.pf==='einzel')){
    syncRechnungForm(); const s=el('rech-sum'); if(s) s.textContent=fmtEUR(rechnungSumme(edRechnung));
  }
  if(t.dataset && (t.dataset.rpf==='anzahl'||t.dataset.rpf==='satz')){
    syncRezeptForm(); const s=el('rezpos-sum'); if(s) s.textContent=fmtEUR(rezPosSum());
  }
});

document.addEventListener('click', e=>{
  const t=e.target.closest('[data-action]');
  if(!t) return;
  const a=t.dataset.action;

  switch(a){
    case 'nav': ui.view=t.dataset.view; render(); window.scrollTo(0,0); break;
    case 'goto': ui.view=t.dataset.view; render(); window.scrollTo(0,0); break;

    /* Rechnungen */
    case 'neue-rechnung': openRechnungForm(null); break;
    case 'edit-rechnung': openRechnungForm(state.rechnungen.find(r=>r.id===t.dataset.id)); break;
    case 'add-termin': syncRechnungForm(); edRechnung.termine.push({datum: edRechnung.datum||todayISO(), einheiten:1}); refreshRechnungForm(); break;
    case 'del-termin': syncRechnungForm(); edRechnung.termine.splice(+t.dataset.i,1); refreshRechnungForm(); break;
    case 'add-pos': {
      syncRechnungForm();
      const sel=el('pos-cat'); const l=state.leistungen.find(x=>x.pos===sel.value);
      if(l){ const tot=totalEinheiten(edRechnung.termine); edRechnung.positionen.push({pos:l.pos,name:l.name,sub:l.sub,anzahl:tot||1,einzel:l.praxis}); refreshRechnungForm(); }
      break;
    }
    case 'del-pos': syncRechnungForm(); edRechnung.positionen.splice(+t.dataset.i,1); refreshRechnungForm(); break;
    case 'save-rechnung': saveRechnung(); break;
    case 'toggle-status': {
      const r=state.rechnungen.find(x=>x.id===t.dataset.id); if(r){ r.status=r.status==='bezahlt'?'offen':'bezahlt'; saveData(); render(); }
      break;
    }
    case 'dup-rechnung': {
      const r=state.rechnungen.find(x=>x.id===t.dataset.id);
      if(r){ const c=structuredClone(r); c.id=uid(); c.datum=todayISO(); c.nummer=nextPrivatNr(c.datum); c.status='offen'; c.zahlungsziel=addDays(c.datum,state.praxis.zahlungszielTage||14); state.counters.privat=(state.counters.privat||0)+1; state.rechnungen.push(c); saveData(); render(); }
      break;
    }
    case 'del-rechnung': {
      const r=state.rechnungen.find(x=>x.id===t.dataset.id);
      if(r && confirm(`Rechnung ${r.nummer} (${r.name}) wirklich löschen?`)){ state.rechnungen=state.rechnungen.filter(x=>x.id!==r.id); saveData(); render(); }
      break;
    }
    case 'print-rechnung': { const r=state.rechnungen.find(x=>x.id===t.dataset.id); if(r) doPrint(renderRechnungDoc(r)); break; }

    /* Rezepte */
    case 'neues-rezept': openRezeptForm(null); break;
    case 'edit-rezept': openRezeptForm(state.rezepte.find(r=>r.id===t.dataset.id)); break;
    case 'toggle-rezpos': {
      syncRezeptForm();
      if(!edRezept.positionen) edRezept.positionen=[];
      if(!edRezept.positionen.length) edRezept.positionen.push(blankRezPos());
      refreshRezeptForm();
      const w=el('rezpos-wrap'); if(w) w.style.display='block';
      break;
    }
    case 'add-rezpos': {
      syncRezeptForm();
      const sel=el('rezpos-cat'); const l=state.leistungen.find(x=>x.pos===sel.value);
      if(l){ edRezept.positionen.push({pos:l.pos,name:l.name,anzahl:1,satz:l.beihilfe}); refreshRezeptForm(); el('rezpos-wrap').style.display='block'; }
      break;
    }
    case 'del-rezpos': syncRezeptForm(); edRezept.positionen.splice(+t.dataset.i,1); refreshRezeptForm(); el('rezpos-wrap').style.display='block'; break;
    case 'rezpos-uebernehmen': { syncRezeptForm(); edRezept.betrag=rezPosSum(); refreshRezeptForm(); el('rezpos-wrap').style.display='block'; break; }
    case 'save-rezept': saveRezept(); break;
    case 'del-rezept': {
      const r=state.rezepte.find(x=>x.id===t.dataset.id);
      if(r){ if(r.abgerechnet){ alert('Dieses Rezept ist bereits Teil einer Praxisabrechnung. Bitte zuerst die betreffende Abrechnung stornieren.'); break; } if(confirm(`Rezept (${r.patient}, ${fmtDate(r.datum)}) löschen?`)){ state.rezepte=state.rezepte.filter(x=>x.id!==r.id); saveData(); fotosDelete(r.id); render(); } }
      break;
    }
    case 'foto-del': if(edRezept&&edRezept.fotos){ edRezept.fotos.splice(+t.dataset.i,1); refreshFotoStrip(); } break;
    case 'foto-zoom': openFotoZoom(((edRezept&&edRezept.fotos)||[])[+t.dataset.i]); break;
    case 'foto-zoom-src': openFotoZoom(_galleryFotos[+t.dataset.i]); break;
    case 'foto-view': openFotoGallery(t.dataset.id); break;
    case 'sec-lock': secLock(); break;
    case 'sec-setup': openSecSetup(); break;
    case 'sec-save-setup': secSaveSetup(); break;
    case 'sec-change': openSecChange(); break;
    case 'sec-save-change': secSaveChange(); break;
    case 'sec-disable': openSecDisable(); break;
    case 'sec-confirm-disable': secConfirmDisable(); break;
    case 'set-monat': break;
    case 'beispiel-rezepte': loadBeispielRezepte(t.dataset.monat); break;
    case 'monatsabrechnung': erstelleMonatsabrechnung(t.dataset.monat); break;
    case 'print-pa': { const p=state.praxisabrechnungen.find(x=>x.id===t.dataset.id); if(p) doPrint(renderPraxisabrechnungDoc(p)); break; }
    case 'toggle-pa-status': { const p=state.praxisabrechnungen.find(x=>x.id===t.dataset.id); if(p){ p.status=p.status==='bezahlt'?'offen':'bezahlt'; saveData(); render(); } break; }
    case 'del-pa': {
      const p=state.praxisabrechnungen.find(x=>x.id===t.dataset.id);
      if(p && confirm(`Praxisabrechnung ${p.nummer} stornieren? Die enthaltenen Rezepte werden wieder als „offen“ markiert.`)){
        (p.rezeptIds||[]).forEach(id=>{ const r=state.rezepte.find(x=>x.id===id); if(r){ r.abgerechnet=false; delete r.abrechnungId; } });
        state.praxisabrechnungen=state.praxisabrechnungen.filter(x=>x.id!==p.id); saveData(); render();
      }
      break;
    }

    /* Leistungen */
    case 'neue-leistung': openLeistungForm(null); break;
    case 'edit-leistung': openLeistungForm(+t.dataset.idx); break;
    case 'save-leistung': saveLeistung(t.dataset.idx); break;
    case 'del-leistung': { const i=+t.dataset.idx; if(confirm(`Position „${state.leistungen[i].name}“ löschen?`)){ state.leistungen.splice(i,1); saveData(); render(); } break; }
    case 'reset-leistungen': if(confirm('Leistungskatalog auf den Standard zurücksetzen? Eigene Änderungen gehen verloren.')){ state.leistungen=structuredClone(DEFAULT_DATA.leistungen); saveData(); render(); } break;

    /* Verträge */
    case 'set-vertrag-typ': syncVertragForm(); ui.vertragTyp=t.dataset.typ; render(); break;
    case 'print-vertrag': printVertrag(); break;
    case 'print-merkblatt': printMerkblatt(); break;
    case 'mahnung-rechnung': openMahnungForm('privat', t.dataset.id); break;
    case 'mahnung-pa': openMahnungForm('pa', t.dataset.id); break;
    case 'print-mahnung': printMahnung(); break;
    case 'quittung-rechnung': openQuittungForm(t.dataset.id); break;
    case 'quittung-zuzahlung': openQuittungZuzahlung(t.dataset.id); break;
    case 'zz-calc': {
      e.preventDefault();
      const rb=parseNum(val('rz-betrag'));
      if(!rb){ alert('Bitte zuerst den Rezeptbetrag eingeben.'); break; }
      const zz=Math.min(Math.round((rb*0.10+10)*100)/100, rb);
      const f=el('rz-zzbetrag'); if(f){ f.value=zz.toFixed(2).replace('.',','); }
      syncRezeptForm();
      break;
    }
    case 'neue-quittung': openQuittungForm(null); break;
    case 'print-quittung': printQuittung(); break;
    case 'kal-prev': { const [y,m]=(ui.kalMonat||currentYM()).split('-').map(Number); const d=new Date(y,m-2,1); ui.kalMonat=d.getFullYear()+'-'+pad2(d.getMonth()+1); render(); break; }

/* ---------- Sicherheit: App-Sperre & Foto-Verschlüsselung (PBKDF2 + AES-GCM) ---------- */
const SEC_KEY='sb_security_v1', SEC_VERIFY='sb-verify-ok', SEC_ITER=250000;
let secCfg=null;      // {enabled, salt, iterations, verifierIv, verifierCt, hint}
let cryptoKey=null;   // abgeleiteter AES-GCM-Schlüssel – nur im Arbeitsspeicher
function cryptoAvailable(){ try{ return !!(window.crypto && window.crypto.subtle && window.isSecureContext); }catch(e){ return false; } }
function secLoad(){ try{ secCfg=JSON.parse(localStorage.getItem(SEC_KEY)||'null'); }catch(e){ secCfg=null; } return secCfg; }
function secSaveCfg(){ try{ if(secCfg) localStorage.setItem(SEC_KEY, JSON.stringify(secCfg)); else localStorage.removeItem(SEC_KEY); }catch(e){} }
function secEnabled(){ return !!(secCfg && secCfg.enabled); }
function _b64(buf){ let s=''; const b=new Uint8Array(buf); for(let i=0;i<b.length;i++) s+=String.fromCharCode(b[i]); return btoa(s); }
function _unb64(str){ return Uint8Array.from(atob(str), c=>c.charCodeAt(0)); }
async function _deriveKey(pw, salt, iter){
  const base=await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:iter, hash:'SHA-256'}, base, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
}
async function _enc(key, str){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, new TextEncoder().encode(str));
  return { iv:_b64(iv), ct:_b64(ct), enc:1 };
}
async function _dec(key, obj){
  const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv:_unb64(obj.iv)}, key, _unb64(obj.ct));
  return new TextDecoder().decode(pt);
}
async function secUnlock(pw){
  if(!secEnabled()) return true;
  try{
    const key=await _deriveKey(pw, _unb64(secCfg.salt), secCfg.iterations||SEC_ITER);
    const v=await _dec(key, {iv:secCfg.verifierIv, ct:secCfg.verifierCt});
    if(v!==SEC_VERIFY) return false;
    cryptoKey=key; return true;
  }catch(e){ return false; }
}
async function secSetup(pw, hint){
  if(!cryptoAvailable()) throw new Error('Die Verschlüsselung ist hier nicht verfügbar – bitte die App über die sichere https-Adresse öffnen.');
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await _deriveKey(pw, salt, SEC_ITER);
  const ver=await _enc(key, SEC_VERIFY);
  cryptoKey=key;
  secCfg={ enabled:true, salt:_b64(salt), iterations:SEC_ITER, verifierIv:ver.iv, verifierCt:ver.ct, hint:hint||'' };
  secSaveCfg();
  await fotosReencryptAll();     // vorhandene Belege verschlüsseln
}
async function secChangePassword(oldPw, newPw, hint){
  if(!(await secUnlock(oldPw))) return false;
  const keys=await fotosAllKeys(), cache={};
  for(const k of keys) cache[k]=await fotosLoad(k);           // mit altem Schlüssel entschlüsseln
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await _deriveKey(newPw, salt, SEC_ITER);
  const ver=await _enc(key, SEC_VERIFY);
  cryptoKey=key;
  secCfg={ enabled:true, salt:_b64(salt), iterations:SEC_ITER, verifierIv:ver.iv, verifierCt:ver.ct, hint:(hint!=null?hint:secCfg.hint)||'' };
  secSaveCfg();
  for(const k of keys) await fotosSave(k, cache[k]);          // mit neuem Schlüssel speichern
  return true;
}
async function secDisable(pw){
  if(!(await secUnlock(pw))) return false;
  const keys=await fotosAllKeys(), cache={};
  for(const k of keys) cache[k]=await fotosLoad(k);           // entschlüsseln
  cryptoKey=null;                                             // ab jetzt Klartext
  secCfg=null; secSaveCfg();
  for(const k of keys) await fotosSave(k, cache[k]);          // Klartext speichern
  return true;
}
async function fotosReencryptAll(){
  const keys=await fotosAllKeys();
  for(const k of keys){ const arr=await fotosLoad(k); await fotosSave(k, arr); }
}
function updateLockButton(){ const b=el('lock-top'); if(b) b.style.display = secEnabled()?'inline-flex':'none'; }
function secLock(){ cryptoKey=null; showLockScreen(); }
function showLockScreen(){
  if(el('lock-screen')) return;
  const ov=document.createElement('div'); ov.id='lock-screen'; ov.className='lock-screen';
  ov.innerHTML=`

      ${secCfg&&secCfg.hint?`<div class="lock-hint">Merkhilfe: ${esc(secCfg.hint)}</div>`:''}

/* ---------- Rezept-Belege: Fotos (Speicherung in IndexedDB) ---------- */
const FOTO_DB='sb_rezept_fotos', FOTO_STORE='fotos';
let _galleryFotos=[];
function fotoDBOpen(){
  return new Promise((resolve,reject)=>{
    try{
      if(typeof window==='undefined' || !window.indexedDB){ reject(new Error('IndexedDB nicht verfügbar')); return; }
      const rq=window.indexedDB.open(FOTO_DB,1);
      rq.onupgradeneeded=()=>{ const db=rq.result; if(!db.objectStoreNames.contains(FOTO_STORE)) db.createObjectStore(FOTO_STORE); };
      rq.onsuccess=()=>resolve(rq.result);
      rq.onerror=()=>reject(rq.error||new Error('IndexedDB-Fehler'));
    }catch(err){ reject(err); }
  });
}
async function fotosAllKeys(){
  try{ const db=await fotoDBOpen(); return await new Promise((res,rej)=>{ const tx=db.transaction(FOTO_STORE,'readonly'); const rq=tx.objectStore(FOTO_STORE).getAllKeys(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }
  catch(e){ return []; }
}
async function fotosLoad(id){
  try{
    const db=await fotoDBOpen();
    const raw=await new Promise((res,rej)=>{ const tx=db.transaction(FOTO_STORE,'readonly'); const rq=tx.objectStore(FOTO_STORE).get(id); rq.onsuccess=()=>res(Array.isArray(rq.result)?rq.result:[]); rq.onerror=()=>rej(rq.error); });
    const out=[];
    for(const item of raw){
      if(item && typeof item==='object' && item.enc){
        if(!cryptoKey) continue;                            // verschlüsselt, aber (noch) kein Schlüssel
        try{ out.push(await _dec(cryptoKey, item)); }catch(e){ /* falscher Schlüssel – überspringen */ }
      } else if(typeof item==='string'){ out.push(item); }  // Klartext (unverschlüsselt)
    }
    return out;
  }catch(e){ return []; }
}
async function fotosSave(id, arr){
  try{
    const db=await fotoDBOpen();
    let store=arr||[];
    if(cryptoKey && store.length){ const enc=[]; for(const durl of store){ enc.push(await _enc(cryptoKey, durl)); } store=enc; }
    await new Promise((res,rej)=>{ const tx=db.transaction(FOTO_STORE,'readwrite'); const st=tx.objectStore(FOTO_STORE); if(store.length) st.put(store,id); else st.delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); });
    return true;
  }catch(e){ console.warn('Beleg speichern fehlgeschlagen:',e); return false; }
}
async function fotosDelete(id){ return fotosSave(id, []); }

function compressImage(file, maxDim, quality){
  maxDim=maxDim||1600; quality=quality||0.72;
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        try{
          let w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
          const m=Math.max(w,h); if(m>maxDim){ const s=maxDim/m; w=Math.round(w*s); h=Math.round(h*s); }
          const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
          const ctx=cv.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); ctx.drawImage(img,0,0,w,h);
          resolve(cv.toDataURL('image/jpeg',quality));
        }catch(err){ reject(err); }
      };
      img.onerror=()=>reject(new Error('Bild konnte nicht geladen werden'));
      img.src=fr.result;
    };
    fr.onerror=()=>reject(fr.error);
    fr.readAsDataURL(file);
  });
}

  edMahnung={ srcType, id, base, level:'erinnerung', datum:todayISO(), frist:addDays(todayISO(),10), gebuehr:0 };

    </div>

    <div class="hint">Eine erste Zahlungserinnerung sollte ohne Gebühr erfolgen. Gebühren und Verzugszinsen sind erst nach Verzugseintritt und nur in angemessener Höhe zulässig.</div>
  `,

function hmkStatusLaden(){
  try{

    fetch('hmk-status.json?t='+Date.now(), {cache:'no-store'})

  const link='<a href="https://www.g-ba.de/richtlinien/12/" target="_blank" rel="noopener" style="color:var(--accent)">g-ba.de/richtlinien/12</a>';
  const s=hmkStatus;
  if(s && !s.fehler && s.aktuellerStand){
    if(String(s.aktuellerStand)>HMK_REGELSTAND){
      return `<div class="note-box" style="border-color:#ecdfc2;background:var(--amber-bg)"><strong style="color:var(--amber)">Neuere Katalogfassung erkannt (Stand ${esc(fmtDate(s.aktuellerStand))}).</strong> Die Prüfregeln dieser App haben Stand ${fmtDate(HMK_REGELSTAND)} – Ergebnisse können veraltet sein. Bitte eine Aktualisierung der Prüfregeln anstoßen. Quelle: ${link}</div>`;

  }
  const tage=daysBetween(HMK_REGELSTAND, todayISO());
  if(tage>420){
    return `<div class="hint" style="margin-top:0">Die Prüfregeln haben Stand ${fmtDate(HMK_REGELSTAND)}. ${s&&s.fehler?'Die automatische Katalog-Überwachung konnte die G-BA-Seite zuletzt nicht auswerten – bitte':'Ob eine neuere Fassung existiert, bitte'} gelegentlich hier prüfen: ${link}</div>`;
  }
  return '';
}

function icdNorm(raw){
  let s=String(raw||'').toUpperCase().replace(/\s+/g,'').replace(/[†*!+]/g,'');

  s=s.replace(/([0-9.\-])[GVZALRB]{1,2}$/,'$1');
  return s;
}

function normTxt(str){ return String(str||'').toLowerCase().replace(/ä/g,'ae').replace(/ö/g,'oe').replace(/ü/g,'ue').replace(/ß/g,'ss').replace(/[^a-z0-9.]+/g,' ').trim(); }
function icdSuche(q){
  const nq=normTxt(q).split(' ').filter(w=>w.length>=2);
  if(!nq.length) return [];
  const res=[];
  for(const d of HMK_DIAG){
    if(!d._h) d._h=normTxt(d.c+' '+d.n+' '+(d.k||'')+' '+(d.g||[]).join(' '));
    if(nq.every(w=>d._h.indexOf(w)>=0)) res.push(d);
    if(res.length>=8) break;
  }
  return res;
}
function renderIcdSuche(q){
  const box=el('ck-suche-res'); if(!box) return;
  if(!q || normTxt(q).length<2){ box.innerHTML=''; return; }
  const hits=icdSuche(q);
  if(!hits.length){
    box.innerHTML=`<div class="hint" style="margin-top:4px">Keine Übereinstimmung in der physiotherapie-bezogenen Auswahl. Vollständige ICD-10-GM-Suche z. B. über <a href="https://www.icd-code.de/" target="_blank" rel="noopener" style="color:var(--accent)">icd-code.de</a> – gefundenen Code oben eintragen.</div>`;
    return;
  }
  box.innerHTML=`<div class="icd-res">${hits.map(h=>`
    <div class="icd-row" data-action="icd-pick" data-c="${h.c}" data-g="${(h.g||[])[0]||''}" role="button">
      <span class="code">${h.c}</span>
      <span class="nm">${esc(h.n)}</span>
      <span class="tags">${(h.g||[]).map(x=>`<span class="tt-badge sonstig">${x}</span>`).join('')}${icdBlankoMatch(h.c.replace(/\.?-$/,''))?'<span class="tt-badge patient">Blanko</span>':''}</span>
    </div>`).join('')}</div>
  <div class="hint" style="margin-top:6px">Kuratierte physiotherapie-bezogene Auswahl (kein vollständiger ICD-10-GM). Endstelligkeit/Seitenangabe ggf. präzisieren – verbindlich codiert die Arztpraxis.</div>`;
}
