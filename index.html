<style>
  :root{
    --bg:#f7f6f1; --paper:#ffffff;
    --ink:#1c1c1c; --soft:#3a3a3a; --muted:#8b8b8b;
    --accent:#8a8a5c; --accent-2:#a3a376; --accent-bg:#f3f3ea;
    --rule:#d9d9d4; --rule-soft:#ececea;
    --amber:#9a7b34; --amber-bg:#f6efdd;
    --green:#5f7148; --green-bg:#eef1e6;
    --danger:#9a4a3c;
    --serif:'Cormorant Garamond','Garamond','Times New Roman',serif;
    --sans:'Inter','Helvetica Neue',Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  h1,h2,h3{margin:0}
  button{font-family:inherit}
  input,select,textarea{font-family:inherit;font-size:14px}

  .eyebrow{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--accent)}
  .display{font-family:var(--serif);font-style:italic;font-weight:500}

  /* ---------- App shell ---------- */
  .app-shell{max-width:1080px;margin:0 auto;padding:0 20px 80px}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:26px 0 18px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand-dots{display:grid;grid-template-columns:repeat(2,5px);gap:4px}
  .brand-dots span{width:5px;height:5px;border-radius:50%;background:var(--accent-2)}
  .brand-name{font-family:var(--serif);font-style:italic;font-weight:500;font-size:26px;line-height:1;color:var(--ink)}
  .brand-tag{font-size:9px;letter-spacing:2.6px;text-transform:uppercase;color:var(--soft);margin-top:4px}
  .topbar .role{font-size:10px;letter-spacing:2.6px;text-transform:uppercase;color:var(--accent);text-align:right}

  .nav{display:flex;gap:4px;border-bottom:1px solid var(--rule);margin-bottom:26px;overflow-x:auto}
  .nav button{background:none;border:none;padding:11px 16px 13px;font-size:13px;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;letter-spacing:.2px}
  .nav button:hover{color:var(--soft)}
  .nav button.active{color:var(--ink);border-bottom-color:var(--accent)}

  /* ---------- Cards ---------- */
  .card{background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:22px 24px;margin-bottom:20px}
  .card-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;border-bottom:1px solid var(--rule);padding-bottom:12px;margin-bottom:18px}
  .card-head h2{font-family:var(--serif);font-style:italic;font-weight:500;font-size:23px;color:var(--ink);line-height:1.1}
  .card-head .sub{font-size:12.5px;color:var(--muted);margin-top:3px}

  /* ---------- Buttons ---------- */
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--accent);background:var(--accent);color:#fff;padding:8px 15px;border-radius:7px;font-size:13px;cursor:pointer;transition:filter .15s,background .15s}
  .btn:hover{filter:brightness(1.06)}
  .btn-ghost{background:transparent;color:var(--accent);border-color:var(--accent-2)}
  .btn-ghost:hover{background:var(--accent-bg);filter:none}
  .btn-sm{padding:5px 11px;font-size:12px}
  .btn-link{background:none;border:none;color:var(--accent);cursor:pointer;font-size:12.5px;padding:4px 6px;border-radius:5px}
  .btn-link:hover{background:var(--accent-bg)}
  .btn-link.danger{color:var(--danger)}
  .btn-link.danger:hover{background:#f6ece9}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--rule);border-radius:8px;overflow:hidden;max-width:100%;flex-wrap:wrap}
  .seg-btn{border:none;background:#fff;padding:9px 16px;font-size:13px;color:var(--muted);cursor:pointer}
  .seg-btn+.seg-btn{border-left:1px solid var(--rule)}
  .seg-btn.active{background:var(--accent-bg);color:var(--accent)}

  /* ---------- Stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:8px}
  .stat{background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:18px 20px}
  .stat .k{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:9px}
  .stat .v{font-family:var(--serif);font-style:italic;font-size:30px;color:var(--ink);line-height:1}
  .stat .d{font-size:12px;color:var(--muted);margin-top:6px}

  /* ---------- Tables ---------- */
  .table-wrap{overflow-x:auto}
  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
  table.tbl th{text-align:left;font-weight:400;font-size:10px;letter-spacing:1.8px;text-transform:uppercase;color:var(--accent);padding:8px 10px;border-bottom:1px solid var(--rule);white-space:nowrap}
  table.tbl th.num,table.tbl td.num{text-align:right}
  table.tbl td{padding:11px 10px;border-bottom:1px solid var(--rule-soft);vertical-align:middle}
  table.tbl tr:last-child td{border-bottom:none}
  table.tbl td.tnum{font-variant-numeric:tabular-nums}
  table.tbl .muted{color:var(--muted);font-size:12.5px}
  table.tbl .strong{color:var(--ink)}
  .row-actions{display:flex;gap:2px;justify-content:flex-end;flex-wrap:wrap}

  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;letter-spacing:.3px}
  .badge.offen{background:var(--amber-bg);color:var(--amber)}
  .badge.bezahlt{background:var(--green-bg);color:var(--green)}

  .empty{text-align:center;color:var(--muted);padding:34px 20px;font-size:13.5px}
  .empty .display{font-size:20px;color:var(--soft);font-style:italic;display:block;margin-bottom:6px}

  /* ---------- Forms ---------- */
  .field{margin-bottom:14px}
  .field>label{display:block;font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
  .input,select.input,textarea.input{width:100%;border:1px solid var(--rule);border-radius:7px;padding:9px 11px;background:#fff;color:var(--ink)}
  .input:focus,select.input:focus,textarea.input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(138,138,92,.12)}
  textarea.input{resize:vertical;min-height:64px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
  .hint{font-size:11.5px;color:var(--muted);margin-top:-8px;margin-bottom:12px}

  .subhead{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin:18px 0 8px;border-top:1px solid var(--rule-soft);padding-top:14px}

  /* dynamic line rows */
  .line-row{display:grid;gap:8px;align-items:center;margin-bottom:8px}
  .line-row .input{margin:0}
  .li-termin{grid-template-columns:1fr 130px 36px}
  .li-pos{grid-template-columns:1fr 70px 110px 110px 36px}
  .li-rezpos{grid-template-columns:1fr 70px 110px 110px 36px}
  .line-head{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
  .icon-btn{border:1px solid var(--rule);background:#fff;color:var(--danger);border-radius:6px;width:34px;height:34px;cursor:pointer;font-size:15px;line-height:1}
  .icon-btn:hover{background:#f6ece9}
  .sum-line{display:flex;justify-content:space-between;align-items:baseline;border-top:1px solid var(--ink);margin-top:12px;padding-top:10px}
  .sum-line .l{font-family:var(--serif);font-style:italic;font-size:18px}
  .sum-line .v{font-family:var(--serif);font-style:italic;font-size:20px;font-variant-numeric:tabular-nums}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(28,28,28,.42);display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;z-index:50;overflow-y:auto}
  .modal{background:var(--paper);border-radius:12px;max-width:760px;width:100%;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;border-bottom:1px solid var(--rule)}
  .modal-head h3{font-family:var(--serif);font-style:italic;font-weight:500;font-size:22px}
  .modal-head .x{border:none;background:none;font-size:24px;color:var(--muted);cursor:pointer;line-height:1;padding:0 4px}
  .modal-head .x:hover{color:var(--ink)}
  .modal-body{padding:22px 24px;max-height:none}
  .modal-foot{display:flex;justify-content:space-between;gap:10px;padding:16px 24px;border-top:1px solid var(--rule);background:#fcfcfa;border-radius:0 0 12px 12px;flex-wrap:wrap}

  .collapse-toggle{font-size:12px;color:var(--accent);cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:6px}

/* ---------- Persistenz ---------- */
const STORE_KEY = 'sb_abrechnung_v1';
let state = loadData();
let ui = { view:'dashboard', rezeptMonth: currentYM(), vertragTyp:'gkv', vertragData:{name:'',geb:'',anschrift:'',kasse:''} };
let gcal = { token:null, events:[], connecting:false, error:'', from:'', to:'' };
let gcalTokenClient = null;

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(raw){ const d = JSON.parse(raw); return Object.assign(structuredClone(DEFAULT_DATA), d); }
  }catch(e){ console.warn('Laden fehlgeschlagen', e); }
  return structuredClone(DEFAULT_DATA);
}
function saveData(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ alert('Speichern fehlgeschlagen: '+e.message+'\n\nBitte exportieren Sie Ihre Daten als Sicherung.'); }
}

/* ---------- Helfer ---------- */
const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
const eur = new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'});
function fmtEUR(n){ return eur.format(Number(n)||0); }
function pad2(n){ return String(n).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(){ return 'r'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function currentYM(){ return todayISO().slice(0,7); }
function fmtDate(iso){ if(!iso) return ''; const p=iso.split('-'); return p.length===3?`${p[2]}.${p[1]}.${p[0]}`:iso; }
function fmtDateLong(iso){ if(!iso) return ''; const p=iso.split('-'); if(p.length!==3) return iso; return `${parseInt(p[2],10)}. ${MONTHS[parseInt(p[1],10)-1]} ${p[0]}`; }
function monthLabel(ym){ if(!ym) return ''; const p=ym.split('-'); return `${MONTHS[parseInt(p[1],10)-1]} ${p[0]}`; }
function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function parseNum(s){
  if(typeof s==='number') return s;
  if(s==null||s==='') return 0;
  s=String(s).replace(/[€\s]/g,'').trim();
  if(s.indexOf(',')>-1) s=s.replace(/\./g,'').replace(',','.');
  const n=parseFloat(s); return isNaN(n)?0:n;
}
function el(id){ return document.getElementById(id); }
function val(id){ const e=el(id); return e?e.value.trim():''; }

function rechnungSumme(r){ return (r.positionen||[]).reduce((s,p)=>s+(Number(p.anzahl)||0)*(Number(p.einzel)||0),0); }
function totalEinheiten(termine){ return (termine||[]).reduce((s,t)=>s+(Number(t.einheiten)||1),0); }
function terminLabels(termine){
  let c=0; const out=[];
  (termine||[]).forEach(t=>{
    const e=Number(t.einheiten)||1; const start=c+1; const end=c+e; c=end;
    out.push({label: e>1?`${pad2(start)} – ${pad2(end)}`:pad2(start), datum:t.datum});
  });
  return out;
}
function nextPrivatNr(datum){
  const yy=(datum||todayISO()).slice(2,4);
  return `R${yy}-${pad2((state.counters.privat||0)+1).padStart(3,'0')}`;
}
function paNrFor(monat){
  let base=`PA-${monat}`;
  const existing=state.praxisabrechnungen.filter(p=>p.nummer===base||p.nummer.startsWith(base+'-')).length;
  return existing?`${base}-${existing+1}`:base;
}

}

function viewDashboard(){

  const offenSum=offen.reduce((s,r)=>s+rechnungSumme(r),0);
  const ym=currentYM();
  const rezMonat=state.rezepte.filter(r=>r.monat===ym);
  const rezSum=rezMonat.reduce((s,r)=>s+(Number(r.betrag)||0),0);
  const paOffen=state.praxisabrechnungen.filter(p=>p.status!=='bezahlt');
  const paOffenSum=paOffen.reduce((s,p)=>s+(Number(p.betrag)||0),0);
  return `
  <div class="stats">
    <div class="stat"><div class="k">Offene Privatrechnungen</div><div class="v">${offen.length}</div><div class="d">${fmtEUR(offenSum)} ausstehend</div></div>
    <div class="stat"><div class="k">Rezepte · ${monthLabel(ym)}</div><div class="v">${rezMonat.length}</div><div class="d">${fmtEUR(rezSum)} Rezeptbeträge</div></div>
    <div class="stat"><div class="k">Offene Praxisabrechnungen</div><div class="v">${paOffen.length}</div><div class="d">${fmtEUR(paOffenSum)} ausstehend</div></div>
  </div>

  <div class="card">
    <div class="card-head">
      <div><h2>Schnellzugriff</h2><div class="sub">Häufige Vorgänge direkt starten</div></div>
    </div>
    <div class="btn-row">
      <button class="btn" data-action="neue-rechnung">＋ Neue Privatrechnung</button>
      <button class="btn btn-ghost" data-action="neues-rezept">＋ Rezept erfassen</button>
      <button class="btn btn-ghost" data-action="goto" data-view="rezepte">Monatsabrechnung erstellen</button>
    </div>
  </div>

  ${offen.length?`
  <div class="card">
    <div class="card-head"><div><h2>Zuletzt offen</h2><div class="sub">Privatrechnungen ohne Zahlungseingang</div></div>
      <button class="btn-link" data-action="goto" data-view="privat">Alle anzeigen →</button></div>
    <div class="table-wrap"><table class="tbl">
      <thead><tr><th>Nr.</th><th>Datum</th><th>Patient/in</th><th class="num">Betrag</th><th></th></tr></thead>
      <tbody>${offen.slice(0,5).map(r=>`
        <tr>
          <td class="strong">${esc(r.nummer)}</td>
          <td class="muted">${fmtDate(r.datum)}</td>
          <td>${esc(r.name)}</td>
          <td class="num tnum strong">${fmtEUR(rechnungSumme(r))}</td>
          <td class="row-actions"><button class="btn-link" data-action="print-rechnung" data-id="${r.id}">Drucken</button></td>
        </tr>`).join('')}
      </tbody></table></div>
  </div>`:''}
  `;
}

/* ---------- Rezepte & Praxisabrechnung ---------- */
function viewRezepte(){
  const ym=ui.rezeptMonth;
  const months = monthOptions();
  const rez=state.rezepte.filter(r=>r.monat===ym).sort((a,b)=>(a.datum||'').localeCompare(b.datum||''));
  const offeneRez=rez.filter(r=>!r.abgerechnet);
  const sumAlle=rez.reduce((s,r)=>s+(Number(r.betrag)||0),0);
  const sumOffen=offeneRez.reduce((s,r)=>s+(Number(r.betrag)||0),0);
  const anteil=Number(state.abrechnendePraxis.anteilProzent)||100;
  const pas=[...state.praxisabrechnungen].sort((a,b)=>(b.monat||'').localeCompare(a.monat||''));
  const apName=state.abrechnendePraxis.name;

  return `
  ${!apName?`<div class="note-box">Hinterlegen Sie zuerst die <strong>abrechnende Praxis</strong> unter „Einstellungen“. Erst dann kann eine Monatsabrechnung adressiert werden.</div>`:''}

  <div class="card">
    <div class="card-head">
      <div><h2>Rezepterfassung</h2><div class="sub">Über die Praxis abgerechnete Heilmittelverordnungen je Monat erfassen</div></div>
      <button class="btn" data-action="neues-rezept">＋ Rezept erfassen</button>
    </div>
    <div class="field" style="max-width:240px">
      <label>Monat</label>
      <select class="input" data-action="set-monat" id="monat-select">
        ${months.map(m=>`<option value="${m}" ${m===ym?'selected':''}>${monthLabel(m)}</option>`).join('')}
      </select>
    </div>

    ${rez.length?`
    <div class="table-wrap"><table class="tbl">
      <thead><tr><th>Datum</th><th>Patient/in</th><th>Rezept-Nr.</th><th class="num">Rezeptbetrag</th><th>Status</th><th></th></tr></thead>
      <tbody>${rez.map(r=>`
        <tr>
          <td class="muted">${fmtDate(r.datum)}</td>
          <td>${esc(r.patient)}</td>
          <td class="muted">${esc(r.rezeptNr||'—')}</td>
          <td class="num tnum strong">${fmtEUR(r.betrag)}</td>
          <td>${r.abgerechnet?`<span class="badge bezahlt">Abgerechnet</span>`:`<span class="badge offen">Offen</span>`}</td>
          <td class="row-actions">
            <button class="btn-link" data-action="edit-rezept" data-id="${r.id}">Bearbeiten</button>
            <button class="btn-link danger" data-action="del-rezept" data-id="${r.id}">Löschen</button>
          </td>
        </tr>`).join('')}
      </tbody></table></div>

    <div class="sum-line"><span class="l">Summe ${monthLabel(ym)}</span><span class="v">${fmtEUR(sumAlle)}</span></div>
    ${sumOffen>0?`
    <div class="btn-row" style="margin-top:16px;align-items:center">
      <button class="btn" data-action="monatsabrechnung" data-monat="${ym}" ${!apName?'disabled style="opacity:.5;cursor:not-allowed"':''}>Monatsabrechnung erstellen</button>
      <span class="muted" style="font-size:12.5px">${offeneRez.length} offene Rezepte · ${fmtEUR(sumOffen)}${anteil!==100?` · Anteil ${anteil}% = ${fmtEUR(sumOffen*anteil/100)}`:''}</span>
    </div>`:`<div class="hint" style="margin-top:14px">Alle Rezepte dieses Monats sind bereits abgerechnet.</div>`}
    `:`<div class="empty"><span class="display">Keine Rezepte im ${monthLabel(ym)}</span>Erfassen Sie die in diesem Monat behandelten Verordnungen, um daraus eine Praxisabrechnung zu erstellen.<div class="btn-row" style="justify-content:center;margin-top:14px"><button class="btn-ghost btn" data-action="beispiel-rezepte" data-monat="${ym}">Beispieldaten laden</button></div></div>`}
  </div>

  <div class="card">
    <div class="card-head"><div><h2>Praxisabrechnungen</h2><div class="sub">Sammelrechnungen an ${apName?esc(apName):'die abrechnende Praxis'}</div></div></div>
    ${pas.length?`
    <div class="table-wrap"><table class="tbl">
      <thead><tr><th>Nr.</th><th>Monat</th><th>Datum</th><th class="num">Rezepte</th><th class="num">Rezeptsumme</th><th class="num">Rechnungsbetrag</th><th>Status</th><th></th></tr></thead>
      <tbody>${pas.map(p=>`
        <tr>
          <td class="strong">${esc(p.nummer)}</td>
          <td>${monthLabel(p.monat)}</td>
          <td class="muted">${fmtDate(p.datum)}</td>
          <td class="num">${(p.rezeptIds||[]).length}</td>
          <td class="num tnum muted">${fmtEUR(p.summe)}</td>
          <td class="num tnum strong">${fmtEUR(p.betrag)}</td>
          <td><span class="badge ${p.status==='bezahlt'?'bezahlt':'offen'}">${p.status==='bezahlt'?'Bezahlt':'Offen'}</span></td>
          <td class="row-actions">
            <button class="btn-link" data-action="print-pa" data-id="${p.id}">PDF</button>
            ${p.status==='bezahlt'?'':`<button class="btn-link" data-action="mahnung-pa" data-id="${p.id}">Erinnerung</button>`}
            <button class="btn-link" data-action="toggle-pa-status" data-id="${p.id}">${p.status==='bezahlt'?'↺ Offen':'✓ Bezahlt'}</button>
            <button class="btn-link danger" data-action="del-pa" data-id="${p.id}">Stornieren</button>
          </td>
        </tr>`).join('')}
      </tbody></table></div>`
    :`<div class="empty">Noch keine Praxisabrechnungen erstellt.</div>`}
  </div>`;
}
function monthOptions(){
  const set=new Set([currentYM(), ui.rezeptMonth]);
  state.rezepte.forEach(r=>set.add(r.monat));
  state.praxisabrechnungen.forEach(p=>set.add(p.monat));
  // letzte 12 Monate ergänzen
  const d=new Date(); d.setDate(1);
  for(let i=0;i<12;i++){ set.add(`${d.getFullYear()}-${pad2(d.getMonth()+1)}`); d.setMonth(d.getMonth()-1); }
  return [...set].filter(Boolean).sort().reverse();
}

/* ---------- Kalender (Google) ---------- */
function viewKalender(){
  const g = state.google||{};
  const isFile = (typeof location!=='undefined' && location.protocol==='file:');

  if(isFile){
    return `<div class="card">
      <div class="card-head"><div><h2>Kalender</h2><div class="sub">Google-Kalender-Anbindung</div></div></div>
      <div class="note-box">Die Kalender-Anbindung funktioniert nur in der über das Internet (https) bereitgestellten App-Variante – nicht, wenn die Datei lokal geöffnet wurde. Bitte die App wie in der Anleitung beschrieben hosten und dort öffnen.</div>
    </div>`;
  }
  if(!g.clientId){
    return `<div class="card">
      <div class="card-head"><div><h2>Kalender</h2><div class="sub">Google-Kalender-Anbindung (nur lesend)</div></div></div>
      <p style="font-size:13.5px;color:var(--soft);margin:0 0 14px">Um Behandlungstermine aus Google Calendar zu übernehmen, wird einmalig eine Google&nbsp;OAuth-Client-ID benötigt. Diese tragen Sie in den Einstellungen ein; die nötigen Schritte stehen dort und in der Installationsanleitung.</p>
      <div class="btn-row"><button class="btn" data-action="goto" data-view="einstellungen">Zu den Einstellungen</button></div>
    </div>`;
  }

  const from = gcal.from || addDays(todayISO(),-60);
  const to   = gcal.to   || addDays(todayISO(),14);
  const connected = !!gcal.token;
  const evs = gcal.events||[];

  return `<div class="card">
    <div class="card-head">
      <div><h2>Kalender</h2><div class="sub">Termine aus Google Calendar ansehen und in eine Rechnung übernehmen</div></div>
      <div class="btn-row">
        ${connected
          ? `<button class="btn btn-ghost" data-action="gcal-refresh" ${gcal.connecting?'disabled':''}>${gcal.connecting?'Lädt …':'Aktualisieren'}</button>`
          : `<button class="btn" data-action="gcal-connect" ${gcal.connecting?'disabled':''}>${gcal.connecting?'Verbinde …':'Mit Google verbinden'}</button>`}
      </div>
    </div>

    ${gcal.error?`<div class="note-box" style="border-left-color:var(--danger);color:var(--danger)">${esc(gcal.error)}</div>`:''}

    <div class="grid3">
      <div class="field"><label>Von</label><input class="input" type="date" id="gcal-from" value="${esc(from)}"></div>
      <div class="field"><label>Bis</label><input class="input" type="date" id="gcal-to" value="${esc(to)}"></div>
      <div class="field" style="display:flex;align-items:flex-end"><button class="btn btn-ghost" data-action="gcal-refresh" style="width:100%" ${connected?'':'disabled'}>Zeitraum laden</button></div>
    </div>

    ${connected ? (evs.length ? `
      <div class="field"><label>Termine filtern</label><input class="input" id="gcal-filter" placeholder="z. B. Name tippen …"></div>
      <div class="hint">Termine auswählen und unten in eine neue Rechnung übernehmen. Der Patientenname wird aus dem Termintitel vorbelegt und kann angepasst werden.</div>
      <div class="table-wrap" style="border:1px solid var(--rule);border-radius:8px">
        ${evs.map(e=>`
          <label class="gcal-row" data-title="${esc((e.titel||'').toLowerCase())}">
            <input type="checkbox" class="gcal-ev" data-date="${esc(e.datum)}" data-title="${esc(e.titel)}">
            <span class="gcal-date">${esc(fmtDate(e.datum))}${e.zeit?` · ${esc(e.zeit)}`:''}</span>
            <span class="gcal-title">${esc(e.titel)}</span>
          </label>`).join('')}
      </div>
      <div class="btn-row" style="margin-top:14px">
        <button class="btn" data-action="gcal-import">Ausgewählte Termine → neue Rechnung</button>
      </div>`
      : `<div class="empty">Keine Termine im gewählten Zeitraum gefunden.</div>`)
    : `<div class="empty"><span class="display">Noch nicht verbunden</span>Mit Google verbinden, um Termine des gewählten Zeitraums anzuzeigen.</div>`}
  </div>`;
}

function makeQR(text,sizePx){
  if(typeof QRCode==='undefined') return '';
  try{
    const tmp=document.createElement('div');
    new QRCode(tmp,{text,width:sizePx,height:sizePx,correctLevel:QRCode.CorrectLevel.M});
    const c=tmp.querySelector('canvas');
    if(c) return c.toDataURL('image/png');
    const img=tmp.querySelector('img');
    if(img&&img.src) return img.src;
  }catch(e){ console.warn('QR-Fehler',e); }
  return '';
}
function epcPayload(name,iban,bic,amount,text){
  return ['BCD','002','1','SCT',(bic||'').replace(/\s+/g,''),name||'',(iban||'').replace(/\s+/g,''),'EUR'+(Number(amount)||0).toFixed(2),'','',text||''].join('\n');
}

    ${hasAnteil?`
      <div class="doc-sub" style="border-top:.5pt solid var(--rule);margin-top:3mm;padding-top:2.5mm"><span>Summe Rezeptbeträge (${rez.length} Verordnungen)</span><span>${fmtEUR(pa.summe)}</span></div>
      <div class="doc-sub"><span>Anteil gemäß Vereinbarung · ${anteil.toLocaleString('de-DE')} %</span><span>${fmtEUR(pa.betrag)}</span></div>

function lastName(full){ const parts=String(full||'').trim().split(/\s+/); return parts.length>1?parts[parts.length-1]:full; }
function initialsName(full){ const parts=String(full||'').trim().split(/\s+/); if(parts.length<2) return full; return parts[0].charAt(0)+'. '+parts[parts.length-1]; }

/* ---------- Behandlungsvertrag (Druck) ---------- */
function vertragText(typ){
  const p=state.praxis;
  const tage=p.zahlungszielTage||14;
  const std=p.absagefristStunden!=null?p.absagefristStunden:24;
  const honorar=fmtEUR(p.ausfallhonorar!=null?p.ausfallhonorar:25);
  const gs=esc(p.gerichtsstand||'Freiburg im Breisgau');
  const nm=esc(p.name), str=esc(p.strasse), plz=esc(p.plzOrt);
  const gkv = typ==='gkv';
  return {
    eyebrow: gkv?'Gesetzlich Versicherte · Heilmittel':'Privatpatientinnen & Selbstzahler',
    introAn:'Sehr geehrte Patientin, sehr geehrter Patient,',
    introP: gkv
      ? 'vielen Dank für Ihr Vertrauen in meine Praxis. Mit diesem Vertrag werden die wesentlichen Rahmenbedingungen für Ihre physiotherapeutische Behandlung als gesetzlich versicherte Patientin oder gesetzlich versicherter Patient festgehalten. Bitte lesen Sie die folgenden Punkte aufmerksam durch und bestätigen Sie diese mit Ihrer Unterschrift auf der letzten Seite.'
      : 'vielen Dank für Ihr Vertrauen in meine Praxis. Mit diesem Vertrag werden die wesentlichen Rahmenbedingungen für Ihre physiotherapeutische Behandlung als Privatpatientin, Privatpatient oder Selbstzahlerin bzw. Selbstzahler festgehalten. Bitte lesen Sie die folgenden Punkte aufmerksam durch und bestätigen Sie diese mit Ihrer Unterschrift auf der letzten Seite.',
    grundlageK:'Vertragsgrundlage',
    grundlage: gkv
      ? `Behandlungsvertrag gemäß §§ 630a ff. BGB in Verbindung mit § 32 SGB V (Heilmittelversorgung). Vertragspartner sind ausschließlich die Praxis ${nm}, ${str}, ${plz}, und die Patientin / der Patient.`
      : `Behandlungsvertrag gemäß §§ 630a ff. BGB. Vertragspartner sind ausschließlich die Praxis ${nm}, ${str}, ${plz}, und die Patientin / der Patient.`,
    kasseLabel: gkv?'Krankenkasse':'Versicherung',
    s1h:'Vertragsgegenstand',
    s1: gkv
      ? 'Die Praxis erbringt physiotherapeutische Heilmittelleistungen auf Grundlage einer ärztlichen Verordnung gemäß § 32 SGB V. Die Leistungen werden, soweit verordnungsfähig, direkt mit der zuständigen gesetzlichen Krankenversicherung abgerechnet. Bestandteil dieses Vertrages sind die gesetzlichen Bestimmungen des Sozialgesetzbuches V sowie die jeweils gültigen Rahmenverträge zwischen den Heilmittelverbänden und dem GKV-Spitzenverband.'
      : 'Die Praxis erbringt physiotherapeutische Leistungen auf Grundlage einer ärztlichen oder heilpraktischen Verordnung oder als Selbstzahlerleistung. Die Leistungen werden nach der gültigen Privatpreisliste der Praxis berechnet und sind von der Patientin / dem Patienten selbst zu tragen. Eine etwaige Erstattung durch eine private Krankenversicherung, Beihilfe oder Zusatzversicherung erfolgt im Verhältnis zwischen der Patientin / dem Patienten und dem jeweiligen Kostenträger; sie berührt die Zahlungspflicht gegenüber der Praxis nicht.',
    s2h: gkv?'Heilmittelverordnung':'Behandlungsgrundlage und Verordnung',
    s2: gkv
      ? 'Voraussetzung für den Behandlungsbeginn ist die Vorlage einer gültigen Heilmittelverordnung (Rezept). Diese muss innerhalb der gesetzlich vorgesehenen Frist – im Regelfall 28 Tage ab Ausstellungsdatum – eingelöst werden. Für die rechtzeitige Beschaffung von Folgeverordnungen sorgt die Patientin / der Patient eigenverantwortlich. Behandlungen ohne gültige Verordnung können nicht mit der Krankenkasse abgerechnet werden und müssen ggf. als Selbstzahlerleistung erbracht werden.'
      : 'Liegt eine ärztliche oder heilpraktische Verordnung vor, bildet diese die fachliche Grundlage der Behandlung. Bei Selbstzahlerleistungen ohne Verordnung erfolgt die Behandlung auf Wunsch der Patientin / des Patienten nach physiotherapeutischer Befunderhebung. Über Art, Umfang und voraussichtliche Kosten der Behandlung wird vor deren Beginn aufgeklärt.',
    s3h:'Termine und Pünktlichkeit',
    s3:'Behandlungstermine werden individuell vereinbart und sind für beide Vertragsparteien verbindlich. Bei verspätetem Erscheinen verkürzt sich die Behandlungszeit entsprechend; eine Verlängerung über den vereinbarten Endzeitpunkt hinaus ist aus organisatorischen Gründen nicht möglich. Die volle vereinbarte Behandlungseinheit gilt dennoch als erbracht.',
    s4k:'§ 4 · Absageregelung und Ausfallhonorar',
    s4h:`Termine müssen spätestens ${std} Stunden vorher abgesagt werden.`,
    s4p1:`Vereinbarte Behandlungstermine sind verbindlich reservierte Zeitfenster. Eine Absage hat spätestens <strong>${std} Stunden vor dem vereinbarten Termin</strong> telefonisch oder schriftlich zu erfolgen (für Termine am Montag entsprechend bis Freitag der Vorwoche). Bei nicht rechtzeitiger Absage oder Nichterscheinen wird ein Ausfallhonorar berechnet:`,
    s4stake:`<strong>Ausfallhonorar: ${honorar}</strong> je versäumter Behandlungseinheit`,
    s4p2: gkv
      ? 'Das Ausfallhonorar ist ein zivilrechtlicher Schadenersatzanspruch (§§ 280, 615 BGB) für den nicht anderweitig vergebbaren Termin und wird <strong>nicht</strong> von der gesetzlichen Krankenversicherung erstattet. Es ist von der Patientin / dem Patienten persönlich zu tragen.'
      : 'Das Ausfallhonorar ist ein zivilrechtlicher Schadenersatzanspruch (§§ 280, 615 BGB) für den nicht anderweitig vergebbaren Termin und wird <strong>nicht</strong> von einer Krankenversicherung oder Beihilfe erstattet. Es ist von der Patientin / dem Patienten persönlich zu tragen.',
    s4p3:'Bei nachweislich unverschuldeter Verhinderung – insbesondere akuter Erkrankung mit ärztlichem Attest, schwerer Erkrankung oder Tod naher Angehöriger oder Unfall – entfällt das Ausfallhonorar.',
    s5h: gkv?'Zuzahlung gesetzlich Versicherter':'Honorar und Zahlung',
    s5: gkv
      ? 'Erwachsene gesetzlich Versicherte leisten gemäß § 32 Abs. 4 i.V.m. § 61 SGB V eine gesetzliche Zuzahlung von <strong>10 % der Behandlungskosten zuzüglich 10,00 € je Verordnung</strong>. Die Zuzahlung ist spätestens nach Abschluss der Behandlungsserie fällig und kann auf Wunsch auch zu Behandlungsbeginn entrichtet werden. Bescheinigungen über die Befreiung von der Zuzahlungspflicht sind unaufgefordert vor Behandlungsbeginn vorzulegen. Patientinnen und Patienten bis zur Vollendung des 18. Lebensjahres sind von der Zuzahlung befreit.'
      : `Die Vergütung richtet sich nach der zum Behandlungszeitpunkt gültigen Privatpreisliste der Praxis, die der Patientin / dem Patienten zugänglich ist. Die Rechnungsstellung erfolgt in der Regel nach Abschluss der Behandlungsserie. Der Rechnungsbetrag ist innerhalb von ${tage} Tagen nach Rechnungsdatum ohne Abzug auf das in der Rechnung angegebene Konto zu zahlen. Bei Zahlungsverzug können Verzugszinsen sowie angemessene Mahnkosten nach den gesetzlichen Bestimmungen berechnet werden.`,
    s6h:'Mitwirkungspflichten',
    s6intro:'Eine erfolgreiche Therapie setzt die aktive Mitwirkung der Patientin / des Patienten voraus. Hierzu gehören insbesondere:',
    s6li:[
      'vollständige und wahrheitsgemäße Angaben zu Vorerkrankungen, Operationen, Schwangerschaft, Medikation und sonstigen behandlungsrelevanten Umständen,',
      'unverzügliche Mitteilung von Schmerzen, Unverträglichkeiten oder Beschwerden während oder nach der Behandlung,',
      'aktive Mitarbeit während der Behandlung sowie Durchführung der vereinbarten Eigenübungen zwischen den Therapieterminen.'
    ],
    s7h:'Datenschutz und Schweigepflicht',
    s7:`Die Erhebung, Verarbeitung und Speicherung Ihrer personen- und behandlungsbezogenen Daten erfolgt ausschließlich zum Zweck der Therapiedurchführung, Dokumentation und Abrechnung gemäß DSGVO und BDSG. Die Praxis und ihre Mitarbeitenden unterliegen der Schweigepflicht nach § 203 StGB. Eine Datenweitergabe erfolgt ausschließlich an ${gkv?'die zuständige Krankenkasse, ':''}die verordnende Ärztin / den verordnenden Arzt sowie die mit der Abrechnung beauftragte Stelle. Über Ihre Betroffenenrechte nach Art. 12 ff. DSGVO informiert Sie ein gesondertes Merkblatt.`,
    s8h:'Vertragsdauer und Schlussbestimmungen',
    s8:`Diese Vereinbarung gilt für die laufende ${gkv?'Verordnung':'Behandlung'} sowie für alle Folgebehandlungen, bis sie schriftlich widerrufen wird. Mündliche Nebenabreden bestehen nicht. Sollte eine Bestimmung unwirksam sein, bleibt die Wirksamkeit der übrigen unberührt. Es gilt deutsches Recht; Gerichtsstand ist – soweit gesetzlich zulässig – ${gs}.`,
    signStmt:`Die vorstehenden Vertragsbedingungen habe ich erhalten und zur Kenntnis genommen. Ich erkenne sie als verbindliche Grundlage der Behandlung an und stimme insbesondere der ${std}-Stunden-Absageregelung und dem damit verbundenen Ausfallhonorar von ${honorar} zu.${gkv?'':' Mir ist bekannt, dass die Behandlungskosten von mir selbst zu tragen sind.'}`
  };
}
function dcClause(num,h,bodyHTML){

}

      <p class="an">Information über die Verarbeitung Ihrer personenbezogenen Daten</p>
      <p>Der Schutz Ihrer persönlichen und gesundheitsbezogenen Daten ist mir ein wichtiges Anliegen. Nachfolgend informiere ich Sie gemäß Artikel 13 der Datenschutz-Grundverordnung (DSGVO) darüber, welche Daten ich zu welchem Zweck verarbeite und welche Rechte Ihnen zustehen.</p>
    </div>
    ${d.name?`<div class="dc-patient"><div class="f"><span class="l">Patient/in</span><span class="v">${esc(d.name)}</span></div><div class="f"><span class="l">Stand</span><span class="v">${esc(fmtDate(todayISO()))}</span></div></div>`:''}
    ${point('1','Verantwortliche Stelle',`<p>Verantwortlich für die Datenverarbeitung im Sinne der DSGVO ist:</p><p><strong>${nm}</strong> · ${ut}<br>${str}, ${plz}<br>Telefon ${tel}</p>`)}
    ${point('2','Zwecke und Rechtsgrundlagen',`<p>Ihre Daten werden zum Zweck der physiotherapeutischen Behandlung, deren Dokumentation sowie zur Abrechnung verarbeitet. Rechtsgrundlagen sind der Behandlungsvertrag (Art. 6 Abs. 1 lit. b DSGVO), die Verarbeitung von Gesundheitsdaten zum Zweck der Gesundheitsversorgung (Art. 9 Abs. 2 lit. h DSGVO i. V. m. § 22 BDSG) sowie die Erfüllung gesetzlicher Aufbewahrungs- und Nachweispflichten (Art. 6 Abs. 1 lit. c DSGVO).</p>`)}
    ${point('3','Kategorien verarbeiteter Daten',`<p>Verarbeitet werden insbesondere Stamm- und Kontaktdaten, Angaben zur Kostenträgerschaft sowie behandlungsbezogene Gesundheitsdaten (Diagnosen, ärztliche Verordnungen, Befunde und Behandlungsverläufe).</p>`)}
    ${point('4','Empfänger der Daten',`<p>Eine Weitergabe erfolgt ausschließlich, soweit dies zur Behandlung und Abrechnung erforderlich ist – insbesondere an die zuständige Krankenkasse bzw. die abrechnende Praxis, an die verordnende Ärztin oder den verordnenden Arzt sowie ggf. an einen mit der Abrechnung beauftragten Dienstleister als Auftragsverarbeiter. Eine Übermittlung in Drittländer findet nicht statt.</p>`)}
    ${foot}
  </div>`;
  const page2=`<div class="doc dc-doc">
    ${pm(2)}
    ${point('5','Speicherdauer',`<p>Ihre Behandlungsdaten werden so lange gespeichert, wie dies für die Behandlung und zur Erfüllung gesetzlicher Aufbewahrungspflichten erforderlich ist – in der Regel zehn Jahre nach Abschluss der Behandlung. Anschließend werden die Daten gelöscht, sofern keine längeren gesetzlichen Fristen bestehen.</p>`)}
    ${point('6','Ihre Rechte',`<p>Sie haben das Recht auf Auskunft (Art. 15), Berichtigung (Art. 16), Löschung (Art. 17), Einschränkung der Verarbeitung (Art. 18), Datenübertragbarkeit (Art. 20) sowie Widerspruch gegen die Verarbeitung (Art. 21 DSGVO). Zur Ausübung genügt eine formlose Mitteilung an die oben genannte verantwortliche Stelle.</p>`)}
    ${point('7','Widerruf von Einwilligungen',`<p>Soweit eine Verarbeitung auf Ihrer Einwilligung beruht, können Sie diese jederzeit mit Wirkung für die Zukunft widerrufen (Art. 7 Abs. 3 DSGVO). Die Rechtmäßigkeit der bis zum Widerruf erfolgten Verarbeitung bleibt unberührt.</p>`)}
    ${point('8','Beschwerderecht',`<p>Ihnen steht ein Beschwerderecht bei einer Datenschutz-Aufsichtsbehörde zu, insbesondere beim Landesbeauftragten für den Datenschutz und die Informationsfreiheit Baden-Württemberg, Lautenschlagerstraße 20, 70173 Stuttgart.</p>`)}
    ${point('9','Keine automatisierte Entscheidungsfindung',`<p>Eine ausschließlich automatisierte Entscheidungsfindung einschließlich Profiling im Sinne des Art. 22 DSGVO findet nicht statt.</p>`)}
    ${point('10','Erforderlichkeit der Bereitstellung',`<p>Die Bereitstellung Ihrer Daten ist für die Durchführung der Behandlung erforderlich. Ohne diese Angaben kann eine ordnungsgemäße physiotherapeutische Versorgung nicht erfolgen.</p>`)}
    <div class="dc-sign">
      <p class="stmt">Ich habe das Datenschutz-Merkblatt erhalten und die Information zur Kenntnis genommen.</p>
      <div class="grid"><div class="col">Ort, Datum</div><div class="col">Unterschrift Patient/in (bzw. gesetzliche Vertretung)</div></div>
    </div>
    ${foot}
  </div>`;
  return page1+page2;
}

/* ---------- Zahlungserinnerung / Mahnung ---------- */
function daysBetween(aIso,bIso){
  const a=new Date(aIso+'T00:00:00'), b=new Date(bIso+'T00:00:00');
  return Math.round((b-a)/86400000);
}
function mahnDataFromRechnung(r){
  return {
    empfaenger: [r.anrede, r.name, r.strasse, 'D '+r.plzOrt].filter(Boolean),
    anrede: (r.anrede==='Herr'?'Sehr geehrter Herr ':'Sehr geehrte Frau ')+esc(lastName(r.name))+',',
    nummer: r.nummer, rechnungDatum: r.datum, faelligkeit: r.zahlungsziel||'', betrag: rechnungSumme(r),
    verwendung: 'Rechnung '+r.nummer+' · '+initialsName(r.name)
  };
}
function mahnDataFromPA(pa){
  const a=state.abrechnendePraxis;
  return {
    empfaenger: [a.name, a.zusatz, a.ansprechpartner?('z. Hd. '+a.ansprechpartner):'', a.strasse, 'D '+a.plzOrt].filter(Boolean),

    nummer: pa.nummer, rechnungDatum: pa.datum, faelligkeit: addDays(pa.datum, state.praxis.zahlungszielTage||14), betrag: pa.betrag,
    verwendung: pa.nummer+' · '+monthLabel(pa.monat)
  };
}
function renderMahnungDoc(m){
  const titel = m.level==='mahnung2' ? '2. Mahnung' : (m.level==='mahnung1' ? '1. Mahnung' : 'Zahlungserinnerung');
  const gebuehr = Number(m.gebuehr)||0;
  const gesamt = (Number(m.betrag)||0) + gebuehr;
  const ueberfaellig = (m.faelligkeit && m.datum) ? daysBetween(m.faelligkeit, m.datum) : 0;
  let intro;
  if(m.level==='mahnung2'){
    intro = 'leider konnte ich auch nach erneuter Erinnerung keinen Zahlungseingang für die unten aufgeführte Rechnung feststellen. Ich fordere Sie hiermit letztmalig auf, den offenen Betrag bis zum unten genannten Termin zu begleichen. Andernfalls behalte ich mir weitere Schritte vor.';
  } else if(m.level==='mahnung1'){
    intro = 'trotz meiner Zahlungserinnerung konnte ich bislang keinen Zahlungseingang für die unten aufgeführte Rechnung feststellen. Ich bitte Sie, den offenen Betrag nunmehr zeitnah auszugleichen.';
  } else {
    intro = 'sicher ist es Ihrer Aufmerksamkeit entgangen: Die unten aufgeführte Rechnung ist bislang noch offen. Ich möchte Sie freundlich an den Ausgleich erinnern.';
  }
  const crossNote = (m.level==='erinnerung')
    ? '<p>Sollte sich Ihre Zahlung mit diesem Schreiben überschnitten haben, betrachten Sie diese Erinnerung bitte als gegenstandslos.</p>' : '';
  const breakdown = gebuehr>0
    ? `<div class="doc-sub" style="border-top:.5pt solid var(--rule);margin-top:3mm;padding-top:2.5mm"><span>Offener Rechnungsbetrag</span><span>${fmtEUR(m.betrag)}</span></div>
       <div class="doc-sub"><span>Mahngebühr</span><span>${fmtEUR(gebuehr)}</span></div>
       <div class="doc-total"><span class="l">Offener Gesamtbetrag</span><span class="v">${fmtEUR(gesamt)}</span></div>`
    : `<div class="doc-total"><span class="l">Offener Betrag</span><span class="v">${fmtEUR(gesamt)}</span></div>`;
  return `<div class="doc dc-doc">
    <div class="doc-pagemark">${esc(titel)} · 01 / 01</div>
    ${docHeader()}
    <div class="doc-addr">
      <div class="rcpt">${m.empfaenger.map(x=>esc(x)).join('<br>')}</div>

document.addEventListener('click', e=>{
  const t=e.target.closest('[data-action]');
  if(!t) return;
  const a=t.dataset.action;

  switch(a){
    case 'nav': ui.view=t.dataset.view; render(); window.scrollTo(0,0); break;
    case 'goto': ui.view=t.dataset.view; render(); window.scrollTo(0,0); break;

    /* Rechnungen */
    case 'neue-rechnung': openRechnungForm(null); break;
    case 'edit-rechnung': openRechnungForm(state.rechnungen.find(r=>r.id===t.dataset.id)); break;
    case 'add-termin': syncRechnungForm(); edRechnung.termine.push({datum: edRechnung.datum||todayISO(), einheiten:1}); refreshRechnungForm(); break;
    case 'del-termin': syncRechnungForm(); edRechnung.termine.splice(+t.dataset.i,1); refreshRechnungForm(); break;
    case 'add-pos': {
      syncRechnungForm();
      const sel=el('pos-cat'); const l=state.leistungen.find(x=>x.pos===sel.value);
      if(l){ const tot=totalEinheiten(edRechnung.termine); edRechnung.positionen.push({pos:l.pos,name:l.name,sub:l.sub,anzahl:tot||1,einzel:l.praxis}); refreshRechnungForm(); }
      break;
    }
    case 'del-pos': syncRechnungForm(); edRechnung.positionen.splice(+t.dataset.i,1); refreshRechnungForm(); break;
    case 'save-rechnung': saveRechnung(); break;
    case 'toggle-status': {
      const r=state.rechnungen.find(x=>x.id===t.dataset.id); if(r){ r.status=r.status==='bezahlt'?'offen':'bezahlt'; saveData(); render(); }
      break;
    }
    case 'dup-rechnung': {
      const r=state.rechnungen.find(x=>x.id===t.dataset.id);
      if(r){ const c=structuredClone(r); c.id=uid(); c.datum=todayISO(); c.nummer=nextPrivatNr(c.datum); c.status='offen'; c.zahlungsziel=addDays(c.datum,state.praxis.zahlungszielTage||14); state.counters.privat=(state.counters.privat||0)+1; state.rechnungen.push(c); saveData(); render(); }
      break;
    }
    case 'del-rechnung': {
      const r=state.rechnungen.find(x=>x.id===t.dataset.id);
      if(r && confirm(`Rechnung ${r.nummer} (${r.name}) wirklich löschen?`)){ state.rechnungen=state.rechnungen.filter(x=>x.id!==r.id); saveData(); render(); }
      break;
    }
    case 'print-rechnung': { const r=state.rechnungen.find(x=>x.id===t.dataset.id); if(r) doPrint(renderRechnungDoc(r)); break; }

    /* Rezepte */
    case 'neues-rezept': openRezeptForm(null); break;
    case 'edit-rezept': openRezeptForm(state.rezepte.find(r=>r.id===t.dataset.id)); break;
    case 'toggle-rezpos': {
      syncRezeptForm();
      if(!edRezept.positionen) edRezept.positionen=[];
      if(!edRezept.positionen.length) edRezept.positionen.push(blankRezPos());
      refreshRezeptForm();
      const w=el('rezpos-wrap'); if(w) w.style.display='block';
      break;
    }
    case 'add-rezpos': {
      syncRezeptForm();
      const sel=el('rezpos-cat'); const l=state.leistungen.find(x=>x.pos===sel.value);
      if(l){ edRezept.positionen.push({pos:l.pos,name:l.name,anzahl:1,satz:l.beihilfe}); refreshRezeptForm(); el('rezpos-wrap').style.display='block'; }
      break;
    }
    case 'del-rezpos': syncRezeptForm(); edRezept.positionen.splice(+t.dataset.i,1); refreshRezeptForm(); el('rezpos-wrap').style.display='block'; break;
    case 'rezpos-uebernehmen': { syncRezeptForm(); edRezept.betrag=rezPosSum(); refreshRezeptForm(); el('rezpos-wrap').style.display='block'; break; }
    case 'save-rezept': saveRezept(); break;
    case 'del-rezept': {
      const r=state.rezepte.find(x=>x.id===t.dataset.id);
      if(r){ if(r.abgerechnet){ alert('Dieses Rezept ist bereits Teil einer Praxisabrechnung. Bitte zuerst die betreffende Abrechnung stornieren.'); break; } if(confirm(`Rezept (${r.patient}, ${fmtDate(r.datum)}) löschen?`)){ state.rezepte=state.rezepte.filter(x=>x.id!==r.id); saveData(); render(); } }
      break;
    }
    case 'set-monat': break;
    case 'beispiel-rezepte': loadBeispielRezepte(t.dataset.monat); break;
    case 'monatsabrechnung': erstelleMonatsabrechnung(t.dataset.monat); break;
    case 'print-pa': { const p=state.praxisabrechnungen.find(x=>x.id===t.dataset.id); if(p) doPrint(renderPraxisabrechnungDoc(p)); break; }
    case 'toggle-pa-status': { const p=state.praxisabrechnungen.find(x=>x.id===t.dataset.id); if(p){ p.status=p.status==='bezahlt'?'offen':'bezahlt'; saveData(); render(); } break; }
    case 'del-pa': {
      const p=state.praxisabrechnungen.find(x=>x.id===t.dataset.id);
      if(p && confirm(`Praxisabrechnung ${p.nummer} stornieren? Die enthaltenen Rezepte werden wieder als „offen“ markiert.`)){
        (p.rezeptIds||[]).forEach(id=>{ const r=state.rezepte.find(x=>x.id===id); if(r){ r.abgerechnet=false; delete r.abrechnungId; } });
        state.praxisabrechnungen=state.praxisabrechnungen.filter(x=>x.id!==p.id); saveData(); render();
      }
      break;
    }

    /* Leistungen */
    case 'neue-leistung': openLeistungForm(null); break;
    case 'edit-leistung': openLeistungForm(+t.dataset.idx); break;
    case 'save-leistung': saveLeistung(t.dataset.idx); break;
    case 'del-leistung': { const i=+t.dataset.idx; if(confirm(`Position „${state.leistungen[i].name}“ löschen?`)){ state.leistungen.splice(i,1); saveData(); render(); } break; }
    case 'reset-leistungen': if(confirm('Leistungskatalog auf den Standard zurücksetzen? Eigene Änderungen gehen verloren.')){ state.leistungen=structuredClone(DEFAULT_DATA.leistungen); saveData(); render(); } break;

    /* Verträge */
    case 'set-vertrag-typ': syncVertragForm(); ui.vertragTyp=t.dataset.typ; render(); break;
    case 'print-vertrag': printVertrag(); break;
    case 'print-merkblatt': printMerkblatt(); break;
    case 'mahnung-rechnung': openMahnungForm('privat', t.dataset.id); break;
    case 'mahnung-pa': openMahnungForm('pa', t.dataset.id); break;
    case 'print-mahnung': printMahnung(); break;
    case 'gcal-connect': gcalConnect(); break;
    case 'gcal-refresh': gcalFetch(); break;
    case 'gcal-import': gcalImport(); break;
    case 'save-google': saveGoogle(); break;

    /* Einstellungen */
    case 'save-praxis': saveePraxis(); break;
    case 'save-abrechnende': saveAbrechnende(); break;
    case 'export-daten': exportDaten(); break;
    case 'import-daten': el('import-file').click(); break;
    case 'reset-daten': if(confirm('Wirklich ALLE Daten zurücksetzen (Rechnungen, Rezepte, Einstellungen)? Dies kann nicht rückgängig gemacht werden.')){ state=structuredClone(DEFAULT_DATA); saveData(); ui.view='dashboard'; render(); } break;

    /* Modal */
    case 'close-modal': closeModal(); break;
    case 'modal-bg': if(e.target===t) closeModal(); break;
  }
});

function saveRechnung(){
  syncRechnungForm();
  const e=edRechnung;
  if(!e.name.trim()){ alert('Bitte einen Namen für den Empfänger angeben.'); return; }
  if(!e.positionen.length){ alert('Bitte mindestens eine Leistung hinzufügen.'); return; }
  const idx=state.rechnungen.findIndex(r=>r.id===e.id);
  const wasNew=e._new; delete e._new;
  if(idx>=0) state.rechnungen[idx]=e; else state.rechnungen.push(e);
  if(wasNew){ const m=String(e.nummer).match(/-(\d+)$/); const seq=m?parseInt(m[1],10):0; state.counters.privat=Math.max(state.counters.privat||0, seq); }
  saveData(); closeModal(); render();
}

function saveRezept(){
  syncRezeptForm();
  const e=edRezept;
  if(!e.patient.trim()){ alert('Bitte den Namen der Patientin / des Patienten angeben.'); return; }

  saveData(); closeModal(); ui.rezeptMonth=e.monat; render();
}

/* ---------- Google Kalender (nur lesend) ---------- */
function loadGIS(){
  return new Promise((resolve,reject)=>{
    if(window.google && google.accounts && google.accounts.oauth2) return resolve();
    let s=document.getElementById('gis-script');
    if(s){ s.addEventListener('load',()=>resolve()); s.addEventListener('error',()=>reject(new Error('Google-Anmeldedienst konnte nicht geladen werden.'))); return; }
    s=document.createElement('script');
    s.id='gis-script'; s.src='https://accounts.google.com/gsi/client'; s.async=true; s.defer=true;
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('Google-Anmeldedienst konnte nicht geladen werden (Internetverbindung?).'));
    document.head.appendChild(s);
  });
}
function gcalConnect(){
  const g=state.google||{};
  if(!g.clientId){ alert('Bitte zuerst die Google OAuth-Client-ID in den Einstellungen hinterlegen.'); return; }
  // Zeitraum aus den Feldern übernehmen, falls vorhanden
  if(el('gcal-from')) gcal.from=val('gcal-from');
  if(el('gcal-to'))   gcal.to=val('gcal-to');
  gcal.connecting=true; gcal.error=''; render();
  loadGIS().then(()=>{
    if(!gcalTokenClient){
      gcalTokenClient = google.accounts.oauth2.initTokenClient({
        client_id: g.clientId,
        scope: 'https://www.googleapis.com/auth/calendar.events.readonly',
        callback: (resp)=>{
          if(resp && resp.access_token){ gcal.token=resp.access_token; gcalFetch(); }
          else { gcal.connecting=false; gcal.error='Anmeldung wurde nicht abgeschlossen.'; render(); }
        },
        error_callback: ()=>{ gcal.connecting=false; gcal.error='Anmeldung abgebrochen oder fehlgeschlagen.'; render(); }
      });
    }
    try{ gcalTokenClient.requestAccessToken({ prompt: gcal.token?'':'consent' }); }
    catch(e){ gcal.connecting=false; gcal.error=e.message; render(); }
  }).catch(e=>{ gcal.connecting=false; gcal.error=e.message; render(); });
}
function gcalFetch(){
  if(!gcal.token){ gcalConnect(); return; }
  if(el('gcal-from')) gcal.from=val('gcal-from');
  if(el('gcal-to'))   gcal.to=val('gcal-to');
  const from = gcal.from || addDays(todayISO(),-60);
  const to   = gcal.to   || addDays(todayISO(),14);
  gcal.connecting=true; gcal.error=''; render();
  const timeMin = new Date(from+'T00:00:00').toISOString();
  const timeMax = new Date(to+'T23:59:59').toISOString();
  const url = 'https://www.googleapis.com/calendar/v3/calendars/primary/events?singleEvents=true&orderBy=startTime&maxResults=250'
    + '&timeMin='+encodeURIComponent(timeMin) + '&timeMax='+encodeURIComponent(timeMax);
  fetch(url, { headers:{ Authorization:'Bearer '+gcal.token } }).then(res=>{
    if(res.status===401){ gcal.token=null; throw new Error('Sitzung abgelaufen – bitte erneut „Mit Google verbinden“.'); }
    if(!res.ok){ throw new Error('Kalender konnte nicht geladen werden (Status '+res.status+').'); }
    return res.json();
  }).then(data=>{
    gcal.events = (data.items||[]).map(ev=>{
      const sd = (ev.start && (ev.start.dateTime||ev.start.date)) || '';
      return { id:ev.id, datum: sd.slice(0,10), zeit: (ev.start&&ev.start.dateTime)? sd.slice(11,16):'', titel: ev.summary||'(ohne Titel)' };
    }).filter(e=>e.datum);
    gcal.connecting=false; render();
  }).catch(e=>{ gcal.connecting=false; gcal.error=e.message; render(); });
}
function gcalImport(){
  const checked = Array.prototype.slice.call(document.querySelectorAll('.gcal-ev:checked'));
  if(!checked.length){ alert('Bitte mindestens einen Termin auswählen.'); return; }
  const termine = checked.map(c=>({datum:c.getAttribute('data-date'), einheiten:1}))
    .sort((a,b)=>a.datum.localeCompare(b.datum));
  const titles = checked.map(c=>c.getAttribute('data-title')).filter(Boolean);
  const counts={}; let name='', best=0;
  titles.forEach(t=>{ counts[t]=(counts[t]||0)+1; if(counts[t]>best){best=counts[t]; name=t;} });
  openRechnungForm(null, { name, termine });
}
function gcalFilter(q){
  q=(q||'').toLowerCase();
  document.querySelectorAll('.gcal-row').forEach(row=>{
    const t=row.getAttribute('data-title')||'';
    row.style.display = (!q || t.indexOf(q)>-1) ? '' : 'none';
  });
}


function erstelleMonatsabrechnung(monat){
  const a=state.abrechnendePraxis;
  if(!a.name){ alert('Bitte zuerst die abrechnende Praxis unter „Einstellungen“ hinterlegen.'); return; }
  const offene=state.rezepte.filter(r=>r.monat===monat && !r.abgerechnet);
  if(!offene.length){ alert('Keine offenen Rezepte in diesem Monat.'); return; }
  const summe=offene.reduce((s,r)=>s+(Number(r.betrag)||0),0);
  const anteil=Number(a.anteilProzent)||100;
  const betragFinal=Math.round(summe*anteil/100*100)/100;
  if(!confirm(`Monatsabrechnung ${monthLabel(monat)} erstellen?\n\n${offene.length} Rezepte · Rezeptsumme ${fmtEUR(summe)}${anteil!==100?`\nAnteil ${anteil}% = ${fmtEUR(betragFinal)}`:''}`)) return;
  const pa={
    id:uid(), nummer:paNrFor(monat), monat, datum:todayISO(),
    rezeptIds:offene.map(r=>r.id), summe, anteilProzent:anteil, betrag:betragFinal, status:'offen'
  };
  offene.forEach(r=>{ r.abgerechnet=true; r.abrechnungId=pa.id; });
  state.praxisabrechnungen.push(pa);
  saveData(); render();
  doPrint(renderPraxisabrechnungDoc(pa));
}

/* ---------- Export / Import ---------- */
function exportDaten(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`Abrechnung_Behringer_Sicherung_${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function handleImportFile(file){
  if(!file) return;
  const fr=new FileReader();
  fr.onload=()=>{
    try{
      const d=JSON.parse(fr.result);
      if(!d || !d.praxis){ throw new Error('Unerwartetes Format'); }
      if(!confirm('Sicherung importieren? Die aktuellen Daten werden ersetzt.')) return;
      state=Object.assign(structuredClone(DEFAULT_DATA), d);
      saveData(); ui.view='dashboard'; render(); toast('Sicherung importiert');
    }catch(err){ alert('Import fehlgeschlagen: '+err.message); }
  };
  fr.readAsText(file);
}

/* ---------- Toast ---------- */
let toastTimer=null;
function toast(msg){
  let t=el('toast');
  if(!t){ t=document.createElement('div'); t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#1c1c1c;color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;z-index:80;box-shadow:0 8px 28px rgba(0,0,0,.25);opacity:0;transition:opacity .2s';
    document.body.appendChild(t);
  }
  t.textContent=msg; requestAnimationFrame(()=>{ t.style.opacity='1'; });
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>{ t.style.opacity='0'; },1800);
}

window.addEventListener('afterprint', ()=>{ el('print-root').innerHTML=''; });

/* ---------- PWA: Service Worker (nur über http/https, nicht bei lokalem file://) ---------- */
if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
}

/* ---------- Init ---------- */
render();
</script>
